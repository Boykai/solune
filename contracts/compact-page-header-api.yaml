# CompactPageHeader Component API Contract
# This file defines the public interface for the CompactPageHeader React component.
# It is the replacement for CelestialCatalogHero across 6 pages.

component:
  name: CompactPageHeader
  file: solune/frontend/src/components/common/CompactPageHeader.tsx
  element: header
  description: >
    Compact single-row page header replacing CelestialCatalogHero.
    Height target: 80–100px. No decorative elements.

props:
  eyebrow:
    type: string
    required: true
    description: Small uppercase label above the title (e.g., "Mission Control")

  title:
    type: string
    required: true
    description: Main heading text displayed as h2

  description:
    type: string
    required: true
    description: >
      Subtitle text, displayed as single line with line-clamp-1.
      Expands on hover (group-hover:line-clamp-none).

  badge:
    type: string
    required: false
    default: undefined
    description: Optional badge text rendered as an inline pill/chip

  stats:
    type: CompactPageHeaderStat[]
    required: false
    default: "[]"
    description: >
      Array of { label: string, value: string } objects.
      Rendered as inline chips. Hidden behind toggle on mobile (< 640px).

  actions:
    type: ReactNode
    required: false
    default: undefined
    description: Action buttons rendered in the right zone of the header

  className:
    type: string
    required: false
    default: undefined
    description: Additional CSS classes forwarded to the root header element

types:
  CompactPageHeaderStat:
    fields:
      label:
        type: string
        required: true
        description: Short uppercase label for the stat
      value:
        type: string
        required: true
        description: Display value for the stat

migration:
  from: CelestialCatalogHero
  removed_props:
    - name: note
      reason: '"Current Ritual" aside removed — duplicated description, consumed ~22rem on LG'
  unchanged_props:
    - eyebrow
    - title
    - description
    - badge
    - stats
    - actions
    - className

pages:
  - file: solune/frontend/src/pages/ProjectsPage.tsx
    line: 323
    changes: "Import swap, remove note prop"

  - file: solune/frontend/src/pages/AgentsPage.tsx
    line: 93
    changes: "Import swap, remove note prop"

  - file: solune/frontend/src/pages/AgentsPipelinePage.tsx
    line: 107
    changes: 'Import swap, remove note prop, remove className="projects-catalog-hero"'

  - file: solune/frontend/src/pages/ToolsPage.tsx
    line: 32
    changes: "Import swap, remove note prop"

  - file: solune/frontend/src/pages/ChoresPage.tsx
    line: 83
    changes: "Import swap, remove note prop"

  - file: solune/frontend/src/pages/HelpPage.tsx
    line: 138
    changes: "Import swap (no note was used)"

css_cleanup:
  file: solune/frontend/src/index.css
  remove:
    - selector: ".dark .projects-catalog-hero.section-aurora"
      lines: "~432–435"
    - selector: ".dark .projects-catalog-hero .catalog-hero-decor"
      lines: "~448–450"
    - selector: ".dark .projects-catalog-hero .catalog-hero-ambient-glow"
      lines: "~452–455"
    - selector: ".dark .projects-catalog-hero .catalog-hero-orbit"
      lines: "~457–459"
    - selector: ".dark .projects-catalog-hero .catalog-hero-moon"
      lines: "~461–466"
    - selector: ".dark .projects-catalog-hero .catalog-hero-aside"
      lines: "~468–473"
    - selector: ".dark .projects-catalog-hero .catalog-hero-aside-sun"
      lines: "~475–477"
    - selector: ".dark .projects-catalog-hero .catalog-hero-aside-orbit-*"
      lines: "~479–483"
    - selector: ".dark .projects-catalog-hero .catalog-hero-note"
      lines: "~485–489"
  retain:
    - ".moonwell (30+ components use it)"
    - ".hanging-stars (LoginPage uses it)"
    - ".celestial-* animation classes (Sidebar, AppLayout, CelestialLoader, etc.)"
