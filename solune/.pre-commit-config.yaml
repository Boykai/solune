# Pre-commit hooks configuration
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Backend Python hooks
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff-format
        name: Format Python (ruff)
        files: ^backend/
      - id: ruff
        name: Lint Python (ruff)
        files: ^backend/
        args: [--fix]

  - repo: local
    hooks:
      - id: backend-pyright
        name: Type Check Backend (pyright)
        entry: bash -c 'cd backend && source .venv/bin/activate 2>/dev/null || true && pyright src'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

      - id: backend-bandit
        name: Security Scan Backend (bandit)
        entry: bash -c 'cd backend && source .venv/bin/activate 2>/dev/null || true && bandit -r src/ -ll -ii --skip B104,B608'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

  # Frontend hooks
  - repo: local
    hooks:
      - id: frontend-lint
        name: Lint Frontend (ESLint)
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false

      - id: frontend-typecheck
        name: Type Check Frontend (TypeScript)
        entry: bash -c 'cd frontend && npm run type-check'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false

      - id: frontend-test
        name: Test Frontend (Vitest)
        entry: bash -c 'cd frontend && npm test'
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false
        stages: [pre-push]  # Run tests only on push, not every commit

      - id: backend-test
        name: Test Backend (pytest)
        entry: bash -c 'cd backend && source .venv/bin/activate 2>/dev/null || true && python -m pytest tests/ -q --tb=short'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false
        stages: [pre-push]  # Run tests only on push, not every commit

      - id: frontend-build
        name: Build Frontend
        entry: bash -c 'cd frontend && npm run build'
        language: system
        files: ^frontend/
        pass_filenames: false
        stages: [pre-push]  # Build verification only on push

      - id: contract-validation
        name: Validate API Contracts
        entry: bash scripts/validate-contracts.sh
        language: system
        files: (^backend/openapi\.json$|^frontend/src/api/|^scripts/validate-contracts\.sh$)
        pass_filenames: false
        stages: [pre-push]  # Requires both backend and frontend deps

  # Documentation hooks
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        name: Lint Markdown (markdownlint)
        args: [--config, .markdownlint.json]
        files: (^docs/.*\.md$|^[^/]*\.md$)

  # Architecture diagram generation
  - repo: local
    hooks:
      - id: generate-diagrams
        name: Regenerate Architecture Diagrams
        entry: bash -c 'cd solune && ./scripts/generate-diagrams.sh && git add docs/architectures/'
        language: system
        files: (^backend/src/|^frontend/src/|^docker-compose\.yml$|^scripts/generate-diagrams\.sh$)
        pass_filenames: false
