name: Copilot Setup Steps

# Runs when the Copilot coding agent starts, before it begins working.
# Must be on the default branch (main) to take effect.
on: workflow_dispatch

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install backend dependencies (includes ruff + pyright)
        working-directory: solune/backend
        run: uv sync

      - name: Install pre-commit hook
        run: |
          cp solune/scripts/pre-commit .git/hooks/pre-commit
          chmod +x .git/hooks/pre-commit
