name: Copilot Setup Steps

# Runs when the Copilot coding agent starts, before it begins working.
# Must be on the default branch (main) to take effect.
on: workflow_dispatch

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.9"

      - name: Install CodeGraphContext
        run: |
          uv venv /tmp/cgc-env
          VIRTUAL_ENV=/tmp/cgc-env uv pip install "tree-sitter-language-pack<1.0.0" codegraphcontext
          echo "/tmp/cgc-env/bin" >> "$GITHUB_PATH"

      - name: Index the repository
        run: cgc index .
        env:
          IGNORE_TEST_FILES: "false"
          IGNORE_HIDDEN_FILES: "true"
          MAX_FILE_SIZE_MB: "10"

      - name: Start CodeGraphContext MCP server
        run: cgc mcp start &
        env:
          IGNORE_TEST_FILES: "false"
          IGNORE_HIDDEN_FILES: "true"
          MAX_FILE_SIZE_MB: "10"
