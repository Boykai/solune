name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default: no permissions. Each job grants only what it needs.
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Backend tests run directly on the runner
  backend:
    name: Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: solune/backend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.10.9"

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Dependency audit with pip-audit
        run: uv run pip-audit .

      - name: Lint with ruff
        run: uv run ruff check src tests

      - name: Format check with ruff
        run: uv run ruff format --check src tests

      - name: Security scan with bandit
        run: uv run bandit -r src/ -ll -ii --skip B104,B608

      - name: Type check with pyright
        run: uv run pyright src

      - name: Type check backend tests with pyright
        run: uv run pyright -p pyrightconfig.tests.json

      - name: Run tests with coverage enforcement
        run: uv run pytest --cov=src --cov-report=term-missing --cov-report=xml --cov-report=html --durations=20 --ignore=tests/property --ignore=tests/fuzz --ignore=tests/chaos --ignore=tests/concurrency

      - name: Upload backend coverage report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: backend-coverage-report
          path: |
            solune/backend/coverage.xml
            solune/backend/htmlcov/
          retention-days: 14
          if-no-files-found: warn

  # Backend advanced tests: property-based, fuzz, chaos, concurrency
  # Non-blocking initially — transition to blocking once baselines stabilize
  # (remove continue-on-error after 2+ weeks of 0 flaky tests)
  backend-advanced-tests:
    name: Backend Advanced Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    defaults:
      run:
        working-directory: solune/backend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.10.9"

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Run property-based tests
        run: uv run pytest tests/property/ --timeout=120 -v
        env:
          HYPOTHESIS_PROFILE: ci

      - name: Run fuzz tests
        run: uv run pytest tests/fuzz/ --timeout=120 -v

      - name: Run chaos tests
        run: uv run pytest tests/chaos/ --timeout=120 -v

      - name: Run concurrency tests
        run: uv run pytest tests/concurrency/ --timeout=120 -v

  # Frontend tests run directly on the runner
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: solune/frontend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: solune/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Type check tests
        run: npm run type-check:test

      - name: Run tests with coverage enforcement
        run: npm run test:coverage

      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: frontend-coverage-report
          path: solune/frontend/coverage/
          retention-days: 14
          if-no-files-found: warn

      - name: Build
        run: npm run build

  frontend-e2e:
    name: Frontend E2E
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    defaults:
      run:
        working-directory: solune/frontend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: solune/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke suite in Chromium
        run: npm run test:e2e -- --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: frontend-e2e-report
          path: |
            solune/frontend/e2e-report/
            solune/frontend/test-results/
          retention-days: 14
          if-no-files-found: warn

  # Documentation linting — markdownlint + link verification
  docs:
    name: Docs Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"

      - name: Install markdownlint-cli and markdown-link-check
        run: npm install -g markdownlint-cli@0.48.0 markdown-link-check@3.14.2

      - name: Lint markdown formatting
        run: markdownlint "solune/docs/**/*.md" "*.md" --config solune/.markdownlint.json

      - name: Check documentation links
        run: |
          find solune/docs -name "*.md" -print0 | xargs -0 -I {} \
            markdown-link-check {} \
              --config solune/.markdown-link-check.json \
              --quiet
          markdown-link-check README.md \
            --config solune/.markdown-link-check.json \
            --quiet

  # Verify architecture diagrams are in sync with the codebase
  diagrams:
    name: Diagrams
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify diagrams are up to date
        run: ./solune/scripts/generate-diagrams.sh --check

  # API contract validation — detect backend/frontend schema drift
  contract-validation:
    name: Contract Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.10.9"

      - name: Install backend dependencies
        run: uv sync --locked --extra dev
        working-directory: solune/backend

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: solune/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: solune/frontend

      - name: Run contract validation
        run: bash solune/scripts/validate-contracts.sh

  # Docker build verification
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build backend image
        run: docker build -t solune-backend ./solune/backend

      - name: Build frontend image
        run: docker build -t solune-frontend ./solune/frontend

      - name: Verify images
        run: |
          docker images | grep solune

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6
        with:
          version: v0.69.3
          cache: true

      - name: Scan backend image
        run: trivy image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed solune-backend

      - name: Scan frontend image
        run: trivy image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed solune-frontend

  # Build validation — fast smoke tests that catch import breakage,
  # moved symbols, and configuration errors before full test suites run.
  # This prevents regressions like the Copilot SDK 0.1.0 import breakage.
  build-validation:
    name: Build Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # ── Backend build validation ──
      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.10.9"

      - name: Install backend dependencies
        run: uv sync --locked --extra dev
        working-directory: solune/backend

      - name: Backend import smoke test
        working-directory: solune/backend
        env:
          GITHUB_CLIENT_ID: ci-smoke
          GITHUB_CLIENT_SECRET: ci-smoke-secret
          SESSION_SECRET_KEY: ci-smoke-session-key-long-enough-for-validation
          DEBUG: "true"
          TESTING: "1"
        run: |
          uv run python -c "
          import importlib, pkgutil, sys
          errors = []
          for _, modname, _ in pkgutil.walk_packages(['src'], prefix='src.'):
              try:
                  importlib.import_module(modname)
              except Exception as e:
                  errors.append(f'{modname}: {e}')
          if errors:
              print('IMPORT ERRORS:', file=sys.stderr)
              for e in errors:
                  print(f'  {e}', file=sys.stderr)
              sys.exit(1)
          print(f'All {len(list(pkgutil.walk_packages([\"src\"], prefix=\"src.\")))} modules imported successfully')
          "

      - name: Backend build smoke tests
        working-directory: solune/backend
        run: uv run pytest tests/unit/test_build_smoke.py -v --timeout=60

      # ── Frontend build validation ──
      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: solune/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: solune/frontend

      - name: Frontend type check
        run: npm run type-check
        working-directory: solune/frontend

      - name: Frontend build
        run: npm run build
        working-directory: solune/frontend

      - name: Frontend build smoke tests
        run: npx vitest run src/lib/build-smoke.test.ts
        working-directory: solune/frontend

      # ── Copilot setup validation ──
      - name: Validate copilot-setup-steps syntax
        run: |
          python3 -c "
          import yaml, sys
          with open('.github/workflows/copilot-setup-steps.yml') as f:
              config = yaml.safe_load(f)
          jobs = config.get('jobs', {})
          if not jobs:
              print('No jobs found in copilot-setup-steps.yml', file=sys.stderr)
              sys.exit(1)
          for job_name, job in jobs.items():
              steps = job.get('steps', [])
              print(f'Job {job_name}: {len(steps)} steps')
              for i, step in enumerate(steps):
                  name = step.get('name', step.get('uses', f'step-{i}'))
                  print(f'  [{i}] {name}')
          print('copilot-setup-steps.yml is valid')
          "
