name: Flaky Detection

"on":
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions: {}

jobs:
  backend-flaky:
    name: Backend Flaky Detection
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: solune/backend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.10.9"

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Run backend suite three times
        run: |
          mkdir -p flaky-reports/backend
          for run in 1 2 3; do
            uv run python -m pytest --timeout=60 -q --junit-xml="flaky-reports/backend/run-${run}.xml" || true
          done

      - name: Analyze backend flakiness
        id: analyze-backend
        run: |
          uv run python - <<'PY'
          from pathlib import Path
          import os
          import xml.etree.ElementTree as ET

          report_dir = Path("flaky-reports/backend")
          runs = sorted(report_dir.glob("run-*.xml"))
          per_test = {}
          for run in runs:
              root = ET.parse(run).getroot()
              for case in root.iter("testcase"):
                  key = "::".join(
                      part
                      for part in (case.get("classname", ""), case.get("name", ""))
                      if part
                  )
                  status = "passed"
                  if case.find("failure") is not None or case.find("error") is not None:
                      status = "failed"
                  elif case.find("skipped") is not None:
                      status = "skipped"
                  per_test.setdefault(key, []).append(status)

          flaky = {name: statuses for name, statuses in per_test.items() if len(set(statuses)) > 1}
          report_path = report_dir / "backend-flaky-report.md"
          lines = ["# Backend Flaky Detection", ""]
          if flaky:
              lines.append("The following backend tests changed status across three runs:")
              lines.append("")
              for name, statuses in sorted(flaky.items()):
                  lines.append(f"- {name}: {', '.join(statuses)}")
          else:
              lines.append("No backend flaky tests detected across three runs.")

          report_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          with Path(os.environ["GITHUB_STEP_SUMMARY"]).open("a", encoding="utf-8") as summary:
              summary.write(report_path.read_text(encoding="utf-8"))
              summary.write("\n")
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              output.write(f"flaky_found={'true' if flaky else 'false'}\n")
          PY

      - name: Upload backend flaky report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: backend-flaky-report
          path: solune/backend/flaky-reports/backend/
          retention-days: 14
          if-no-files-found: warn

      - name: Fail when backend flaky tests were found
        if: steps.analyze-backend.outputs.flaky_found == 'true'
        run: exit 1

  frontend-flaky:
    name: Frontend Flaky Detection
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: solune/frontend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: solune/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend suite three times
        run: |
          mkdir -p flaky-reports/frontend
          for run in 1 2 3; do
            npx vitest run --reporter=junit --outputFile="flaky-reports/frontend/run-${run}.xml" || true
          done

      - name: Analyze frontend flakiness
        id: analyze-frontend
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const reportDir = path.join(process.cwd(), 'flaky-reports/frontend');
          const runs = fs.readdirSync(reportDir).filter((name) => name.endsWith('.xml')).sort();
          const perTest = new Map();

          for (const run of runs) {
            const content = fs.readFileSync(path.join(reportDir, run), 'utf8');
            const testcaseRegex = /<testcase\b([^>]*)>([\s\S]*?)<\/testcase>|<testcase\b([^>]*)\/>/g;
            for (const match of content.matchAll(testcaseRegex)) {
              const attrs = match[1] || match[3] || '';
              const body = match[2] || '';
              const nameMatch = attrs.match(/name="([^"]+)"/);
              const classMatch = attrs.match(/classname="([^"]+)"/);
              const key = [classMatch?.[1], nameMatch?.[1]].filter(Boolean).join('::');
              let status = 'passed';
              if (body.includes('<failure') || body.includes('<error')) {
                status = 'failed';
              } else if (body.includes('<skipped')) {
                status = 'skipped';
              }
              const existing = perTest.get(key) || [];
              existing.push(status);
              perTest.set(key, existing);
            }
          }

          const flaky = [...perTest.entries()].filter(([, statuses]) => new Set(statuses).size > 1);
          const reportPath = path.join(reportDir, 'frontend-flaky-report.md');
          const lines = ['# Frontend Flaky Detection', ''];
          if (flaky.length) {
            lines.push('The following frontend tests changed status across three runs:', '');
            for (const [name, statuses] of flaky.sort((a, b) => a[0].localeCompare(b[0]))) {
              lines.push(`- ${name}: ${statuses.join(', ')}`);
            }
          } else {
            lines.push('No frontend flaky tests detected across three runs.');
          }

          fs.writeFileSync(reportPath, `${lines.join('\n')}\n`, 'utf8');
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, fs.readFileSync(reportPath, 'utf8'));
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, '\n');
          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            `flaky_found=${flaky.length ? 'true' : 'false'}\n`,
          );
          NODE

      - name: Upload frontend flaky report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: frontend-flaky-report
          path: solune/frontend/flaky-reports/frontend/
          retention-days: 14
          if-no-files-found: warn

      - name: Fail when frontend flaky tests were found
        if: steps.analyze-frontend.outputs.flaky_found == 'true'
        run: exit 1