name: solune

services:
  backend:
    build:
      context: ./solune/backend
      dockerfile: Dockerfile
    container_name: solune-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file: ./solune/.env
    environment:
      # Container-specific overrides (not in .env)
      - HOST=0.0.0.0
      - PORT=8000
      - CORS_ORIGINS=http://localhost:5173,http://localhost:80,http://frontend
      - SIGNAL_API_URL=http://signal-api:8080
      - DATABASE_PATH=/var/lib/solune/data/settings.db
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    volumes:
      - solune-data:/var/lib/solune/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      signal-api:
        condition: service_healthy
    networks:
      - solune-network
  frontend:
    build:
      context: ./solune/frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api/v1}
    container_name: solune-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:5173:8080"
    env_file: ./solune/.env
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - solune-network

  signal-api:
    image: bbernhard/signal-cli-rest-api:0.98
    container_name: solune-signal-api
    restart: unless-stopped
    environment:
      - MODE=json-rpc
      - DEFAULT_SIGNAL_TEXT_MODE=styled
    volumes:
      - signal-cli-config:/home/.local/share/signal-cli
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "-o", "/dev/null", "-w", "%{http_code}", "http://localhost:8080/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - solune-network

  # ── Observability (Phase 5) — activated via: docker compose --profile observability up ──
  jaeger:
    image: jaegertracing/jaeger:latest
    container_name: solune-jaeger
    profiles:
      - observability
    restart: unless-stopped
    ports:
      - "127.0.0.1:16686:16686"  # Jaeger UI
      - "127.0.0.1:4317:4317"    # OTLP gRPC
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - solune-network

volumes:
  solune-data:
    driver: local
  signal-cli-config:
    driver: local

networks:
  solune-network:
    driver: bridge
