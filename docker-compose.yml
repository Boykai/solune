name: solune

services:
  backend:
    build:
      context: ./solune/backend
      dockerfile: Dockerfile
    container_name: solune-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_REDIRECT_URI=${GITHUB_REDIRECT_URI:-http://localhost:5173/api/v1/auth/github/callback}
      - AI_PROVIDER=${AI_PROVIDER:-copilot}
      - COPILOT_MODEL=${COPILOT_MODEL:-gpt-4o}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_KEY=${AZURE_OPENAI_KEY}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT:-gpt-4}
      - SESSION_SECRET_KEY=${SESSION_SECRET_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - DEFAULT_REPOSITORY=${DEFAULT_REPOSITORY:-}
      - DEFAULT_PROJECT_ID=${DEFAULT_PROJECT_ID:-}
      - DEFAULT_ASSIGNEE=${DEFAULT_ASSIGNEE:-}
      - ADMIN_GITHUB_USER_ID=${ADMIN_GITHUB_USER_ID:-}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
      - GITHUB_WEBHOOK_TOKEN=${GITHUB_WEBHOOK_TOKEN:-}
      - COPILOT_POLLING_INTERVAL=${COPILOT_POLLING_INTERVAL:-60}
      - DEBUG=${DEBUG:-false}
      - HOST=0.0.0.0
      - PORT=8000
      - CORS_ORIGINS=http://localhost:5173,http://localhost:80,http://frontend
      - SIGNAL_API_URL=${SIGNAL_API_URL:-http://signal-api:8080}
      - SIGNAL_PHONE_NUMBER=${SIGNAL_PHONE_NUMBER:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - ENABLE_DOCS=${ENABLE_DOCS:-false}
      - DATABASE_PATH=/var/lib/solune/data/settings.db
      # Observability (Phase 5) — opt-in
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4317}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-solune-backend}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
      - PIPELINE_STALL_ALERT_MINUTES=${PIPELINE_STALL_ALERT_MINUTES:-30}
      - RATE_LIMIT_CRITICAL_THRESHOLD=${RATE_LIMIT_CRITICAL_THRESHOLD:-20}
    volumes:
      - solune-data:/var/lib/solune/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      signal-api:
        condition: service_healthy
    networks:
      - solune-network
  frontend:
    build:
      context: ./solune/frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api/v1}
    container_name: solune-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:5173:8080"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - solune-network

  signal-api:
    image: bbernhard/signal-cli-rest-api:0.98
    container_name: solune-signal-api
    restart: unless-stopped
    environment:
      - MODE=json-rpc
      - DEFAULT_SIGNAL_TEXT_MODE=styled
    volumes:
      - signal-cli-config:/home/.local/share/signal-cli
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "-o", "/dev/null", "-w", "%{http_code}", "http://localhost:8080/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - solune-network

  # ── Observability (Phase 5) — activated via: docker compose --profile observability up ──
  jaeger:
    image: jaegertracing/jaeger:latest
    container_name: solune-jaeger
    profiles:
      - observability
    restart: unless-stopped
    ports:
      - "127.0.0.1:16686:16686"  # Jaeger UI
      - "127.0.0.1:4317:4317"    # OTLP gRPC
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - solune-network

volumes:
  solune-data:
    driver: local
  signal-cli-config:
    driver: local

networks:
  solune-network:
    driver: bridge
