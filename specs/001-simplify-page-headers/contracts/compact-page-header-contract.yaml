component:
  name: CompactPageHeader
  source: /home/runner/work/solune/solune/solune/frontend/src/components/common/CompactPageHeader.tsx
  kind: react-component
  purpose: Compact reusable page header replacing large decorative catalog heroes on six frontend pages.

props:
  eyebrow:
    type: string
    required: true
    contract: Render a non-empty contextual label.
  title:
    type: string
    required: true
    contract: Render the main heading text.
  description:
    type: string
    required: true
    contract: Render as a single-line subtitle by default with expanded full text behavior on hover/interaction.
  badge:
    type: string
    required: false
    contract: Omit the badge region when value is absent.
  stats:
    type: CompactPageHeaderStat[]
    required: false
    contract: Render compact stat chips; on mobile, hide by default behind a toggle when stats exist.
  actions:
    type: ReactNode
    required: false
    contract: Preserve prior action affordances without changing behavior.
  className:
    type: string
    required: false
    contract: Forward optional extra styling classes to the root header element.

types:
  CompactPageHeaderStat:
    fields:
      label:
        type: string
        required: true
      value:
        type: string
        required: true

invariants:
  - Do not render decorative hero elements, orbits, stars, beams, or a “Current Ritual” aside.
  - Do not accept or depend on a note prop.
  - Render cleanly when badge, stats, or actions are omitted.
  - Preserve responsive usability on narrow screens.

adopters:
  - /home/runner/work/solune/solune/solune/frontend/src/pages/ProjectsPage.tsx
  - /home/runner/work/solune/solune/solune/frontend/src/pages/AgentsPage.tsx
