# Rate Limiting Contract
# Defines rate limiting behavioral requirements

contract:
  name: Rate Limiting
  version: "1.0"
  scope: Backend API endpoints
  library: slowapi (FastAPI-compatible)

endpoints:
  - path: /api/v1/auth/github/callback
    limit: "20/minute"
    scope: per-IP
    reason: Prevent brute-force attacks on OAuth callback
    owasp: A04

  - path: /api/v1/chat/*
    limit: "10/minute"
    scope: per-user
    reason: Prevent exhaustion of shared AI quotas
    owasp: A04

  - path: /api/v1/agents/*
    limit: "5/minute"
    scope: per-user
    reason: Prevent exhaustion of shared AI/GitHub quotas
    owasp: A04

  - path: /api/v1/apps/*
    limit: "10/minute"
    scope: per-user
    reason: Prevent excessive app operations
    owasp: A04

behavior:
  exceeded:
    status_code: 429
    response: "Too Many Requests"
    headers:
      Retry-After: Seconds until rate limit resets

  strategy:
    preference: Per-user over per-IP
    reason: Avoid penalizing users behind shared NAT/VPN
    unauthenticated_fallback: Per-IP for unauthenticated endpoints

infrastructure:
  storage: In-memory (adequate for single-instance deployment)
  scaling_note: For multi-instance deployments, migrate to Redis-backed storage
