## Frontend Coverage Targets

### Vitest Thresholds

```yaml
current:
  statements: 50%
  branches: 44%
  functions: 41%
  lines: 50%

target:
  statements: 60%
  branches: 55%
  functions: 52%
  lines: 60%
```

### Focus Areas

```yaml
focus:
  hooks:
    description: "60+ custom hooks — largest source of uncovered logic"
    priority: P1

  services:
    description: "API client and schema validation — critical data layer"
    priority: P1

  components_chat:
    description: "Complex chat UI with streaming, markdown, commands"
    priority: P2

