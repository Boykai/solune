## Test Quality Contract

### Test Structure Standards

Every new test file MUST follow these patterns:

#### Backend (pytest)

```python
"""Tests for {module_name}.

Covers:
- {primary behavior}
- {error paths}
- {edge cases}
"""

import pytest
from unittest.mock import AsyncMock, MagicMock, patch

# Arrange-Act-Assert pattern
class TestClassName:
    """Tests for ClassName."""

    async def test_behavior_description(self):
        """Given {precondition}, when {action}, then {expected}."""
        # Arrange
        ...
        # Act
        result = await function_under_test(...)
        # Assert
        assert result == expected

    @pytest.mark.parametrize("input_val,expected", [
        (None, ValueError),
        ("", ValueError),
        ("valid", "result"),
    ])
    async def test_edge_cases(self, input_val, expected):
        """Parametrized edge case coverage."""
        ...
```

#### Frontend (vitest)

```typescript
import { describe, it, expect, vi } from 'vitest';
import { renderHook, act } from '@testing-library/react';
import { render, screen } from '@testing-library/react';

describe('ComponentName', () => {
  it('renders expected content when given valid props', () => {
    // Arrange
    render(<Component prop="value" />);
    // Assert
    expect(screen.getByRole('button', { name: /submit/i })).toBeInTheDocument();
  });

  it('handles error state gracefully', () => {
    // Arrange & Act
    render(<Component error="Something went wrong" />);
    // Assert
    expect(screen.getByRole('alert')).toHaveTextContent('Something went wrong');
  });
});
```

#### E2E (Playwright)

```typescript
import { test, expect } from '@playwright/test';

test.describe('Feature Flow', () => {
  test('completes the full user journey', async ({ page }) => {
    // Navigate
    await page.goto('/feature');
    // Interact
    await page.getByRole('button', { name: /start/i }).click();
    // Verify
    await expect(page.getByRole('heading', { name: /success/i })).toBeVisible();
  });
});
```

## Test Removal Contract

### Criteria for Test Removal

A test MAY be removed if it meets ANY of the following:

1. **No assertions**: Test body contains no `assert`, `expect`, or verification calls
2. **Tests deleted code**: Imports modules or references features that no longer exist
3. **Exact duplicate**: Another test covers the identical code path with identical assertions
4. **Over-mocked**: Every dependency is mocked; the test verifies only mock wiring, not behavior
5. **Always passes**: Test passes regardless of implementation (e.g., mocks return the expected value directly)

### Removal Process

1. Identify candidate test(s) using criteria above
2. Run coverage with and without the test — if coverage doesn't change, safe to remove
3. Document removal reason in commit message
4. Verify CI passes after removal

## Coverage Reporting Contract

### Backend Coverage Report Format

```yaml
report:
  format: [term-missing, xml, html, json]
  location: solune/backend/coverage.{xml,json} + htmlcov/
  ci_artifact: backend-coverage-report
  retention: 14 days
```

### Frontend Coverage Report Format

```yaml
report:
  format: [v8]
  location: solune/frontend/coverage/
  thresholds_enforced: true
  ci_artifact: none (inline in vitest output)
```
