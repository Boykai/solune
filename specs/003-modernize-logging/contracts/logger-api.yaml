openapi: "3.1.0"
info:
  title: Frontend Logger Utility API
  version: "1.0.0"
  description: |
    Contract for the centralized frontend logger utility (`src/lib/logger.ts`).
    This is not an HTTP API — it describes the TypeScript module's public interface
    and behavior contract for consumption by the `speckit.tasks` and `speckit.implement` agents.

components:
  schemas:
    LogContext:
      type: object
      description: >
        Optional context object passed to logger methods. Top-level keys matching
        sensitive patterns are redacted to '[REDACTED]' before emission.
      additionalProperties: true
      example:
        operation: "fetchAgents"
        duration_ms: 142
        authorization: "[REDACTED]"

    SensitiveKeyPattern:
      type: string
      description: >
        Case-insensitive key patterns that trigger redaction.
      enum:
        - authorization
        - token
        - cookie
        - password
        - secret

    LoggerMethod:
      type: object
      description: Signature for debug/warn/error methods.
      properties:
        tag:
          type: string
          description: Short kebab-case identifier for the log source.
          examples: ["sse", "websocket", "auth", "global:onerror", "schema"]
        msg:
          type: string
          description: Human-readable event description.
        ctx:
          $ref: "#/components/schemas/LogContext"
      required: [tag, msg]

    CaptureExceptionMethod:
      type: object
      description: Signature for captureException method.
      properties:
        error:
          description: The caught error (any type).
        ctx:
          $ref: "#/components/schemas/LogContext"
      required: [error]

    LoggerModule:
      type: object
      description: >
        The default export of `src/lib/logger.ts`. A singleton logger object
        with four methods.
      properties:
        debug:
          description: >
            Emits to console.debug ONLY when import.meta.env.DEV is true.
            Context keys are redacted before emission.
          $ref: "#/components/schemas/LoggerMethod"
        warn:
          description: >
            Always emits to console.warn.
            Context keys are redacted before emission.
          $ref: "#/components/schemas/LoggerMethod"
        error:
          description: >
            Always emits to console.error.
            Context keys are redacted before emission.
          $ref: "#/components/schemas/LoggerMethod"
        captureException:
          description: >
            Always emits to console.error. Stores the error for future
            APM forwarding (Phase 6). Context keys are redacted.
          $ref: "#/components/schemas/CaptureExceptionMethod"

    StructuredFields:
      type: object
      description: >
        Backend canonical structured fields emitted by StructuredJsonFormatter
        when present as `extra` dict keys on a Python log record.
      properties:
        operation:
          type: string
          description: Logical operation name (snake_case).
          examples: ["create_issue", "get_agents", "run_pipeline"]
        duration_ms:
          type: number
          description: Wall-clock duration in milliseconds (non-negative).
          minimum: 0
        error_type:
          type: string
          description: Python exception class name.
          examples: ["ValueError", "GithubApiError", "HTTPStatusError"]
        status_code:
          type: integer
          description: HTTP status code (100-599).
          minimum: 100
          maximum: 599

    OTelLogBridgeConfig:
      type: object
      description: >
        Configuration for the OTel logs bridge in otel_setup.py.
        Only created when OTEL_ENABLED=true.
      properties:
        enabled:
          type: boolean
          description: Whether the bridge is active.
        exporter:
          type: string
          description: OTLP exporter type.
          enum: ["grpc"]
        endpoint:
          type: string
          description: >
            OTLP collector endpoint. Defaults to localhost:4317 or
            OTEL_EXPORTER_OTLP_ENDPOINT env var.
        processor:
          type: string
          description: Log record processor type.
          enum: ["batch"]
