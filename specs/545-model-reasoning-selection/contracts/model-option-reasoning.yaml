# OpenAPI Contract Delta: Model Reasoning Level Selection
# This file describes the schema changes to ModelOption and AIPreferences
# for the reasoning effort feature. Apply these changes to the generated
# openapi.json after running scripts/export-openapi.py.

openapi: 3.1.0
info:
  title: Solune API — Model Reasoning Delta
  version: 545-model-reasoning-selection

paths: {}

components:
  schemas:

    # ──────────────────────────────────────────────────
    # ModelOption — MODIFIED (2 fields added)
    # Source: solune/backend/src/models/settings.py
    # ──────────────────────────────────────────────────
    ModelOption:
      type: object
      required:
        - id
        - name
        - provider
      properties:
        id:
          type: string
          description: Model identifier (e.g., "o3", "gpt-4.1")
          example: "o3"
        name:
          type: string
          description: Human-readable model name
          example: "o3"
        provider:
          type: string
          description: Provider slug
          example: "copilot"
        # ── NEW FIELDS ──
        supported_reasoning_efforts:
          type: array
          items:
            type: string
            enum: ["low", "medium", "high", "xhigh"]
          nullable: true
          default: null
          description: >
            Reasoning levels this model supports. Null if the model
            does not support configurable reasoning effort.
          example: ["low", "medium", "high"]
        default_reasoning_effort:
          type: string
          enum: ["low", "medium", "high", "xhigh"]
          nullable: true
          default: null
          description: >
            The model's default reasoning level. Null if the model
            does not support configurable reasoning effort.
          example: "medium"

    # ──────────────────────────────────────────────────
    # AIPreferences — MODIFIED (1 field added)
    # Source: solune/backend/src/models/settings.py
    # ──────────────────────────────────────────────────
    AIPreferences:
      type: object
      required:
        - provider
        - model
        - temperature
      properties:
        provider:
          $ref: '#/components/schemas/AIProvider'
        model:
          type: string
        temperature:
          type: number
          minimum: 0.0
          maximum: 2.0
        agent_model:
          type: string
          default: ""
        # ── NEW FIELD ──
        reasoning_effort:
          type: string
          enum: ["", "low", "medium", "high", "xhigh"]
          default: ""
          description: >
            User's preferred reasoning level. Empty string means
            no preference (API default behavior).

    # ──────────────────────────────────────────────────
    # Frontend type alignment notes
    # ──────────────────────────────────────────────────
    # AIModel (frontend/src/types/index.ts):
    #   - Add: supported_reasoning_efforts?: string[]
    #   - Add: default_reasoning_effort?: string | null
    #   - Add: reasoning_effort?: string  (set by useModels expansion)
    #
    # AIPreferences (frontend/src/types/index.ts):
    #   - Add: reasoning_effort?: string
    #
    # PipelineModelOverride (frontend/src/types/index.ts):
    #   - Add: reasoningEffort?: string
