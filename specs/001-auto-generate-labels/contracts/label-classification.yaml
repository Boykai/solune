# Label Classification Service Contract
#
# Internal Python service contract — not an HTTP API.
# Defined as OpenAPI-style YAML for consistency with the speckit workflow.
# This documents the function signature, input/output shapes, and behavior
# that the LabelClassificationService must satisfy.

openapi: "3.1.0"
info:
  title: Label Classification Service
  version: "1.0.0"
  description: >
    Internal async service for classifying GitHub issue labels from content.
    Called by issue creation paths (pipeline launch, task creation, agent tool).
    Not exposed as an HTTP endpoint.

components:
  schemas:
    LabelClassificationRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          maxLength: 256
          description: Issue title for classification
          example: "Optimize database query performance for the user dashboard"
        description:
          type: string
          description: >
            Optional issue body for additional classification context.
            Truncated to 2,000 characters internally.
          example: "The user dashboard loads slowly due to N+1 queries in the project list endpoint..."

    LabelClassificationResult:
      type: object
      required:
        - labels
      properties:
        labels:
          type: array
          items:
            type: string
          minItems: 2
          description: >
            Validated, deduplicated label list. Always contains "ai-generated"
            (at index 0) and exactly one type label. All labels are from the
            predefined taxonomy in constants.LABELS.
          example:
            - "ai-generated"
            - "enhancement"
            - "backend"
            - "database"
            - "performance"

    FallbackLabels:
      description: >
        Default labels returned when classification fails. Path-specific.
      type: object
      properties:
        pipeline_path:
          type: array
          items:
            type: string
          example: ["ai-generated", "pipeline:speckit-full"]
        task_path:
          type: array
          items:
            type: string
          example: ["ai-generated"]
        agent_tool_path:
          type: array
          items:
            type: string
          example: ["ai-generated"]

  # Service interface (Python async function signatures)
  x-service-interface:
    module: src.services.label_classifier
    functions:
      classify_labels:
        description: >
          Classify labels for a GitHub issue based on title and description.
          Returns a validated, deduplicated label list guaranteed to include
          "ai-generated" and exactly one type label.
        signature: |
          async def classify_labels(
              title: str,
              description: str = "",
              *,
              github_token: str,
              fallback_labels: list[str] | None = None,
          ) -> list[str]
        parameters:
          - name: title
            type: str
            required: true
            description: Issue title
          - name: description
            type: str
            required: false
            default: ""
            description: Issue description (truncated to 2,000 chars)
          - name: github_token
            type: str
            required: true
            description: GitHub OAuth token for AI provider authentication
          - name: fallback_labels
            type: list[str] | None
            required: false
            default: null
            description: >
              Path-specific fallback labels returned when classification fails.
              When None, defaults to ["ai-generated", "feature"].
        returns:
          type: list[str]
          description: Validated label list
          guarantees:
            - "ai-generated" is always at index 0
            - Exactly one type label is present
            - All labels exist in constants.LABELS
            - No duplicate labels
        raises:
          - Never raises — all exceptions caught internally
        fallback: >
          On any failure, returns the caller-supplied fallback_labels (if
          provided) or ["ai-generated", "feature"] as the minimum valid
          label set.  The AI call is wrapped in a 5-second timeout.

      validate_labels:
        description: >
          Post-process raw AI output into a valid label set.
          Pure function (no AI call).
        signature: |
          def validate_labels(raw_labels: list[str]) -> list[str]
        parameters:
          - name: raw_labels
            type: list[str]
            required: true
            description: Raw labels from AI response
        returns:
          type: list[str]
          description: Validated, deduplicated label list
        guarantees:
          - Same invariants as classify_labels return value

  # Behavioral contract
  x-behavioral-contract:
    performance:
      max_latency_seconds: 3
      description: >
        classify_labels must complete within 3 seconds under normal conditions.
        If the AI call exceeds this, the timeout should trigger the fallback path.

    error_handling:
      strategy: graceful-fallback
      description: >
        Any exception during classification (network error, JSON parse error,
        AI service unavailable, invalid response format) results in fallback
        labels being returned. Issue creation is NEVER blocked.
      logging_level: WARNING

    idempotency:
      description: >
        classify_labels is stateless and has no side effects beyond the AI API call.
        Calling it multiple times with the same input may return different results
        (AI non-determinism) but all results will be valid per the guarantees.

    integration_points:
      - path: Pipeline Launch
        file: src/api/pipelines.py
        function: execute_pipeline_launch
        merge_strategy: >
          classified_labels + [pipeline:<name>] — pipeline label always appended,
          "ai-generated" deduplicated.
      - path: Task Creation
        file: src/api/tasks.py
        function: create_task
        merge_strategy: >
          classified_labels used directly as the labels parameter.
      - path: Agent Tool
        file: src/services/agent_tools.py
        function: create_project_issue
        merge_strategy: >
          If agent provides labels, use agent labels.
          Otherwise, use classified_labels.
