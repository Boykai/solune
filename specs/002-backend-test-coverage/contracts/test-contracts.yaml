# Test Contracts: Increase Backend Test Coverage & Fix Bugs
#
# Defines the test contracts for each target module. These are not REST API
# contracts but rather testing contracts that specify:
#   - What behaviors must be tested
#   - What inputs/outputs to verify
#   - What edge cases to cover
#   - What mocking strategy to use
#
# Each contract maps to a user story in spec.md and a phase in the parent issue.

modules:

  # ─── Module 1: projects.py (Phase 2) ───

  projects:
    source_file: solune/backend/src/api/projects.py
    test_file: solune/backend/tests/unit/test_api_projects.py
    baseline_coverage: 37.7%
    target_coverage: ~70%
    test_groups:

      - name: rate_limit_detection
        description: >
          Verify GitHub rate limit detection from 403 responses with
          X-RateLimit-Remaining header analysis.
        scenarios:
          - id: TC-PROJ-001
            input: "403 response with X-RateLimit-Remaining: '0'"
            expected: Rate limit detected, stale cache served
            mock: github_projects_service.list_user_projects raises PrimaryRateLimitExceeded

          - id: TC-PROJ-002
            input: "403 response with empty rate limit dict"
            expected: Not treated as rate limit, regular error path
            mock: github_projects_service.list_user_projects raises RequestFailed(status=403)

      - name: task_fallback
        description: >
          Verify get_project_tasks falls back to local DB cache on API failure.
        scenarios:
          - id: TC-PROJ-003
            input: API exception during task fetch
            expected: get_done_items() called, Task models from DB returned
            mock: github_projects_service.get_project_items raises Exception

          - id: TC-PROJ-004
            input: API exception, DB cache also empty
            expected: Empty task list returned gracefully
            mock: get_done_items returns []

      - name: list_projects_cache
        description: >
          Verify cache edge cases for project listing.
        scenarios:
          - id: TC-PROJ-005
            input: Cache returns empty list []
            expected: Empty project list response (not cache miss)
            mock: cache.get returns []

          - id: TC-PROJ-006
            input: Cache returns None (unpopulated)
            expected: API call triggered to populate cache
            mock: cache.get returns None

          - id: TC-PROJ-007
            input: Non-rate-limit error from API
            expected: Error handling without rate limit logic
            mock: github_projects_service.list_user_projects raises generic Exception

      - name: get_project_cache
        description: >
          Verify get_project handles cache edge cases.
        scenarios:
          - id: TC-PROJ-008
            input: Project ID not in cached project list
            expected: 404 or graceful miss handling
            mock: cache.get returns list without requested project

          - id: TC-PROJ-009
            input: refresh=True but API returns error
            expected: Fallback to cached data or appropriate error
            mock: cache invalidation + API failure

      - name: websocket_subscribe
        description: >
          Verify WebSocket subscription lifecycle.
        scenarios:
          - id: TC-PROJ-010
            input: Client connects, data changes (hash differs)
            expected: Updated data pushed to client
            mock: connection_manager, github_projects_service, cache

          - id: TC-PROJ-011
            input: Stale revalidation counter triggers refresh
            expected: Periodic refresh executed, new data compared via hash
            mock: Simulated counter reaching threshold

          - id: TC-PROJ-012
            input: Client disconnects unexpectedly
            expected: WebSocketDisconnect caught, cleanup executed
            mock: websocket.receive_json raises WebSocketDisconnect

  # ─── Module 2: agent_creator.py (Phase 3) ───

  agent_creator:
    source_file: solune/backend/src/services/agent_creator.py
    test_file: solune/backend/tests/unit/test_agent_creator.py
    baseline_coverage: 39.4%
    target_coverage: ~65%
    test_groups:

      - name: admin_auth_edge_cases
        description: >
          Verify admin authentication edge cases beyond happy path.
        scenarios:
          - id: TC-AC-001
            input: Debug mode enabled, first user connects
            expected: Auto-promote via CAS (UPDATE WHERE admin_github_user_id IS NULL)
            mock: db.execute with rowcount=1 for CAS success

          - id: TC-AC-002
            input: ADMIN_GITHUB_USER_ID env var set to specific user
            expected: Configured user recognized as admin
            mock: settings.ADMIN_GITHUB_USER_ID = "12345"

          - id: TC-AC-003
            input: Database exception during admin check
            expected: Graceful failure, no internal details exposed
            mock: db.execute raises aiosqlite.Error

      - name: status_resolution
        description: >
          Verify fuzzy status matching and selection handling.
        scenarios:
          - id: TC-AC-004
            input: Empty string for status
            expected: Handled without crash, prompts user
            mock: fuzzy_match_status("", columns)

          - id: TC-AC-005
            input: Status matches after normalization (case-insensitive)
            expected: Correct canonical status returned
            mock: fuzzy_match_status("IN PROGRESS", ["In Progress", "Done"])

          - id: TC-AC-006
            input: Out-of-range numeric selection (e.g., "99")
            expected: Rejection with clear error message
            mock: _handle_status_selection with invalid index

          - id: TC-AC-007
            input: New column needs creation during resolution
            expected: Column created via API
            mock: github_projects_service.create_column

      - name: creation_pipeline
        description: >
          Verify multi-step creation pipeline (Steps 3-7).
        scenarios:
          - id: TC-AC-008
            input: Duplicate agent name in same project
            expected: Error returned, pipeline halted
            mock: db.execute returns existing row for name check

          - id: TC-AC-009
            input: Step 5 (issue creation) fails, Step 6 succeeds
            expected: Pipeline continues, issue failure logged as warning
            mock: create_issue raises Exception, create_branch succeeds

          - id: TC-AC-010
            input: Step 7 (PR creation) fails after issue created
            expected: Error returned with cleanup attempt
            mock: create_pull_request raises Exception

      - name: ai_service_failures
        description: >
          Verify handling of AI service failures during creation.
        scenarios:
          - id: TC-AC-011
            input: generate_agent_config() raises exception
            expected: User-facing error, session cleaned up
            mock: ai_service.generate_agent_config raises Exception

          - id: TC-AC-012
            input: edit_agent_config() fails on retry
            expected: Error message, preview preserved for re-edit
            mock: ai_service.edit_agent_config raises Exception

          - id: TC-AC-013
            input: AI returns string instead of list for tools
            expected: Graceful handling, tools coerced or defaulted
            mock: ai_service returns {"tools": "single-tool-string"}

  # ─── Module 3: agents/service.py (Phase 4) ───

  agents_service:
    source_file: solune/backend/src/services/agents/service.py
    test_file: solune/backend/tests/unit/test_agents_service.py
    baseline_coverage: 47.4%
    target_coverage: ~70%
    test_groups:

      - name: cache_stale_data
        description: >
          Verify caching, preference overlay, and stale fallback.
        scenarios:
          - id: TC-AS-001
            input: Cached agent list + user preference overlay
            expected: Preferences merged (model_id, model_name, icon_name)
            mock: cache.get returns agents, db returns preferences

          - id: TC-AS-002
            input: Cache expired, API fails
            expected: Stale data returned rather than error
            mock: cache.get returns None, _list_repo_agents raises Exception

          - id: TC-AS-003
            input: Active sessions with expired TTL
            expected: Stale sessions pruned, active preserved
            mock: BoundedDict with old timestamps

      - name: agent_source_mixing
        description: >
          Verify bulk operations across REPO and LOCAL sources.
        scenarios:
          - id: TC-AS-004
            input: bulk_update_models() with both REPO and LOCAL agents
            expected: Both sources updated correctly
            mock: db.execute for LOCAL, github API for REPO

          - id: TC-AS-005
            input: Partial failure during bulk update
            expected: Successful updates applied, failures reported
            mock: Some updates succeed, some raise Exception

          - id: TC-AS-006
            input: Agent list includes tombstoned (PENDING_DELETION) agents
            expected: Tombstoned agents excluded from results
            mock: db returns agents with lifecycle_status=PENDING_DELETION

      - name: yaml_frontmatter
        description: >
          Verify YAML frontmatter parsing edge cases.
        scenarios:
          - id: TC-AS-007
            input: Agent file with missing YAML fields (no description)
            expected: Default values used for missing fields
            mock: github_projects_service.get_file_content returns partial YAML

          - id: TC-AS-008
            input: Agent file with YAML parse errors (invalid syntax)
            expected: Fallback to basic agent without crashing
            mock: get_file_content returns malformed YAML

          - id: TC-AS-009
            input: Agent file with no YAML frontmatter (plain markdown)
            expected: Handled gracefully, agent still listed
            mock: get_file_content returns markdown without ---

      - name: tool_resolution
        description: >
          Verify tool resolution and MCP normalization.
        scenarios:
          - id: TC-AS-010
            input: MCP server config in various formats
            expected: Normalized to standard GitHub agent YAML shape
            mock: Various MCP config JSON structures

          - id: TC-AS-011
            input: Wildcard tool pattern vs explicit tool IDs
            expected: Wildcards expanded, explicit preserved, duplicates removed
            mock: Tool list with wildcards and overlapping IDs

          - id: TC-AS-012
            input: Invalid MCP configuration (missing required fields)
            expected: Invalid configs skipped with warning
            mock: Malformed MCP config entries

      - name: create_agent
        description: >
          Verify agent creation pipeline.
        scenarios:
          - id: TC-AS-013
            input: Agent name with special characters (emojis, unicode)
            expected: Valid sanitized slug generated
            mock: AgentCreate with special char name

          - id: TC-AS-014
            input: AI enhancement fails during creation
            expected: Fallback to raw user input (no AI enhancement)
            mock: _enhance_agent_content raises Exception

          - id: TC-AS-015
            input: Raw mode (skip AI enhancement)
            expected: Agent created with user input as-is
            mock: AgentCreate with raw=True flag

  # ─── Module 4: chores/service.py (Phase 5) ───

  chores_service:
    source_file: solune/backend/src/services/chores/service.py
    test_file: solune/backend/tests/unit/test_chores_service.py
    baseline_coverage: 51.3%
    target_coverage: ~75%
    test_groups:

      - name: preset_seeding
        description: >
          Verify idempotent preset seeding behavior.
        scenarios:
          - id: TC-CS-001
            input: seed_presets() called when presets already exist
            expected: No duplicates created (idempotent)
            mock: db.execute returns existing preset IDs

          - id: TC-CS-002
            input: Preset file read failure
            expected: Graceful handling, error logged
            mock: Path.read_text raises FileNotFoundError

          - id: TC-CS-003
            input: Fresh seed with all 3 presets
            expected: All 3 created with unique IDs
            mock: db.execute returns no existing presets

      - name: update_validation
        description: >
          Verify update field validation and type conversion.
        scenarios:
          - id: TC-CS-004
            input: Inconsistent schedule parameters (type without value)
            expected: Validation error returned
            mock: ChoreUpdate with schedule_type but no schedule_value

          - id: TC-CS-005
            input: Boolean True for enabled field
            expected: Converted to integer 1
            mock: update_chore_fields({"enabled": True})

          - id: TC-CS-006
            input: Column name with SQL injection payload
            expected: Rejected before reaching db.execute
            mock: update_chore_fields({"name; DROP TABLE chores": "val"})

          - id: TC-CS-007
            input: Boolean False for auto_merge field
            expected: Converted to integer 0
            mock: update_chore_fields({"auto_merge": False})

      - name: trigger_state_cas
        description: >
          Verify CAS trigger semantics for double-fire prevention.
        scenarios:
          - id: TC-CS-008
            input: First trigger (last_triggered_at = NULL)
            expected: CAS succeeds, new timestamp recorded
            mock: db.execute with rowcount=1

          - id: TC-CS-009
            input: Matching old value for last_triggered_at
            expected: CAS succeeds, timestamp updated
            mock: db.execute with rowcount=1

          - id: TC-CS-010
            input: Mismatched old value (another process already fired)
            expected: CAS fails (rowcount=0), double-fire prevented
            mock: db.execute with rowcount=0

          - id: TC-CS-011
            input: clear_current_issue() called
            expected: current_issue_number and current_issue_node_id set to NULL
            mock: db.execute verifying SET clause
