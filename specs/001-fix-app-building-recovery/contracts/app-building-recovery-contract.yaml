feature: fix-app-building-project-recovery
summary: >
  Behavioral contract for cross-repo app-building recovery across plan-driven
  app creation, project selection, and pipeline-state reconstruction.

http_flows:
  - name: create_with_plan_launches_cross_repo_pipelines
    entrypoint:
      method: POST
      path: /api/v1/apps/create-with-plan
    request_source:
      file: /home/runner/work/solune/solune/solune/backend/src/api/apps.py
      handler: create_with_plan_endpoint
    guarantees:
      - resolved_repository.owner and resolved_repository.repo are forwarded into orchestrate_app_creation
      - orchestrate_app_creation forwards owner and repo into _launch_phase_pipelines
      - each execute_pipeline_launch call receives target_repo: [owner, repo]
      - cross-repo launches create parent issues and persisted pipeline state on the target repository rather than the default repository

  - name: select_project_restores_cross_repo_polling
    entrypoint:
      method: POST
      path: /api/v1/projects/{project_id}/select
    request_source:
      file: /home/runner/work/solune/solune/solune/backend/src/api/projects.py
      handler: select_project
    response:
      status_code: 200
      body: UserResponse
    side_effects:
      - await _start_copilot_polling(session, project_id)
      - enqueue _restore_app_pipelines_for_project(session.access_token, project_id) via task_registry.create_task(...)
    guarantees:
      - the HTTP response does not wait for scoped app-pipeline restoration to finish
      - active cross-repo pipeline states for the selected project call ensure_app_pipeline_polling
      - same-repo or complete pipeline states do not create scoped polling tasks

internal_flows:
  - name: reconstruct_pipeline_state_preserves_repository
    function:
      file: /home/runner/work/solune/solune/solune/backend/src/services/copilot_polling/pipeline.py
      symbol: _reconstruct_pipeline_state
    inputs:
      access_token: string
      owner: string
      repo: string
      issue_number: integer
      project_id: string
      status: string
      agents: string[]
    output:
      type: PipelineState
      required_fields:
        - issue_number
        - project_id
        - repository_owner
        - repository_name
    guarantees:
      - repository_owner equals the owner input
      - repository_name equals the repo input
      - graceful reconstruction fallback behavior remains unchanged when comments or issue data are missing

verification:
  unit_tests:
    - /home/runner/work/solune/solune/solune/backend/tests/unit/test_app_plan_orchestrator.py
    - /home/runner/work/solune/solune/solune/backend/tests/unit/test_api_projects.py
    - /home/runner/work/solune/solune/solune/backend/tests/unit/test_copilot_polling.py
    - /home/runner/work/solune/solune/solune/backend/tests/unit/test_main.py
  regression_command: >
    cd /home/runner/work/solune/solune/solune/backend &&
    uv run --with pytest --with pytest-asyncio pytest tests/ -q
