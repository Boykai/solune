asyncapi: "3.0.0"
info:
  title: Solune Plan Orchestration WebSocket Events
  version: "1.0.0"
  description: >
    WebSocket events broadcast during plan-based app creation orchestration.
    Sent via the existing ConnectionManager.broadcast_to_project() pattern.

channels:
  planOrchestrationProgress:
    description: Real-time progress updates for plan orchestration
    messages:
      planStatusUpdate:
        $ref: "#/components/messages/PlanStatusUpdate"
      planPhaseCreated:
        $ref: "#/components/messages/PlanPhaseCreated"
      planOrchestrationComplete:
        $ref: "#/components/messages/PlanOrchestrationComplete"
      planOrchestrationFailed:
        $ref: "#/components/messages/PlanOrchestrationFailed"

components:
  messages:
    PlanStatusUpdate:
      payload:
        type: object
        properties:
          type:
            type: string
            const: plan_status_update
          app_name:
            type: string
          orchestration_id:
            type: string
            format: uuid
          status:
            type: string
            enum: [planning, speckit_running, parsing_phases, creating_issues, launching_pipelines, active]
          detail:
            type: string
            description: Human-readable description of current step

    PlanPhaseCreated:
      payload:
        type: object
        properties:
          type:
            type: string
            const: plan_phase_created
          app_name:
            type: string
          phase_index:
            type: integer
          phase_title:
            type: string
          issue_number:
            type: integer
          issue_url:
            type: string
            format: uri

    PlanOrchestrationComplete:
      payload:
        type: object
        properties:
          type:
            type: string
            const: plan_orchestration_complete
          app_name:
            type: string
          phase_count:
            type: integer
          phase_issue_numbers:
            type: array
            items:
              type: integer

    PlanOrchestrationFailed:
      payload:
        type: object
        properties:
          type:
            type: string
            const: plan_orchestration_failed
          app_name:
            type: string
          error:
            type: string
          failed_at_status:
            type: string
