# Build Progress WebSocket Contract

asyncapi: "3.0.0"
info:
  title: Build Progress WebSocket Events
  version: "0.5.0"
  description: |
    Real-time build progress events broadcast via the existing WebSocket
    connection (`/api/ws/{project_id}`). These events extend the existing
    WebSocket message types (initial_data, refresh) with a new `build_progress`
    type.

channels:
  projectWebSocket:
    address: /api/ws/{project_id}
    description: Existing WebSocket connection for project real-time updates
    parameters:
      project_id:
        description: GitHub project node ID
    messages:
      buildProgress:
        $ref: "#/components/messages/BuildProgressEvent"
      buildMilestone:
        $ref: "#/components/messages/BuildMilestoneEvent"
      buildComplete:
        $ref: "#/components/messages/BuildCompleteEvent"
      buildFailed:
        $ref: "#/components/messages/BuildFailedEvent"

components:
  messages:
    BuildProgressEvent:
      name: build_progress
      summary: Incremental build progress update
      payload:
        $ref: "#/components/schemas/BuildProgressPayload"

    BuildMilestoneEvent:
      name: build_milestone
      summary: Build milestone reached (triggers Signal notification)
      payload:
        $ref: "#/components/schemas/BuildMilestonePayload"

    BuildCompleteEvent:
      name: build_complete
      summary: Build completed successfully
      payload:
        $ref: "#/components/schemas/BuildCompletePayload"

    BuildFailedEvent:
      name: build_failed
      summary: Build failed with error
      payload:
        $ref: "#/components/schemas/BuildFailedPayload"

  schemas:
    BuildProgressPayload:
      type: object
      required: [type, app_name, phase, detail, pct_complete, updated_at]
      properties:
        type:
          type: string
          const: "build_progress"
        app_name:
          type: string
          example: "stock-tracker"
        phase:
          type: string
          enum: [scaffolding, configuring, issuing, building, deploying_prep, complete, failed]
          description: Current build phase
        agent_name:
          type: string
          nullable: true
          description: Currently active agent (null during non-agent phases)
          example: "speckit.implement"
        detail:
          type: string
          description: Human-readable status message
          example: "Rendering template files..."
        pct_complete:
          type: integer
          minimum: 0
          maximum: 100
          example: 35
        updated_at:
          type: string
          format: date-time

    BuildMilestonePayload:
      type: object
      required: [type, app_name, milestone, message, updated_at]
      properties:
        type:
          type: string
          const: "build_milestone"
        app_name:
          type: string
        milestone:
          type: string
          enum: [scaffolded, working, review, complete]
        message:
          type: string
          description: Human-readable milestone message
          example: "🏗️ App scaffolded — template files created"
        updated_at:
          type: string
          format: date-time

    BuildCompletePayload:
      type: object
      required: [type, app_name, links, message, updated_at]
      properties:
        type:
          type: string
          const: "build_complete"
        app_name:
          type: string
        message:
          type: string
          example: "✅ App 'stock-tracker' build complete!"
        links:
          type: object
          properties:
            app_url:
              type: string
              description: URL to the app in Solune
            repo_url:
              type: string
              description: GitHub repository URL
            project_url:
              type: string
              nullable: true
              description: GitHub Project board URL
            issue_url:
              type: string
              description: Parent issue URL
        updated_at:
          type: string
          format: date-time

    BuildFailedPayload:
      type: object
      required: [type, app_name, phase, message, updated_at]
      properties:
        type:
          type: string
          const: "build_failed"
        app_name:
          type: string
        phase:
          type: string
          description: Phase where failure occurred
        message:
          type: string
          description: Generic error message (no internal details exposed)
          example: "Build failed during pipeline execution"
        updated_at:
          type: string
          format: date-time
