# Import API Contract

openapi: "3.1.0"
info:
  title: App Import API
  version: "0.5.0"
  description: Endpoint for importing existing GitHub repositories into Solune.

paths:
  /api/apps/import:
    post:
      operationId: importApp
      summary: Import a GitHub repository as a Solune app
      description: |
        Validates the GitHub repository URL, creates an app record linked to the
        external repository, and optionally creates a GitHub Project V2 board and
        attaches a pipeline.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportAppRequest"
      responses:
        "201":
          description: App successfully imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportAppResponse"
        "400":
          description: Invalid request (malformed URL, repo not found, already imported)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
        "403":
          description: Insufficient permissions to access the repository
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    ImportAppRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
          description: GitHub repository URL
          example: "https://github.com/user/my-project"
        pipeline_id:
          type: string
          nullable: true
          description: Pipeline to attach to the imported app
          example: "preset-medium"
        create_project:
          type: boolean
          default: true
          description: Whether to create a GitHub Project V2 board

    ImportAppResponse:
      type: object
      required: [app, message]
      properties:
        app:
          type: object
          description: The created app record (same schema as existing App model)
        message:
          type: string
          example: "Repository 'my-project' imported successfully"
        project_url:
          type: string
          nullable: true
          description: URL of created GitHub Project V2 board (if create_project was true)

    ErrorResponse:
      type: object
      required: [detail]
      properties:
        detail:
          type: string
          example: "Repository not found or not accessible with current permissions"
