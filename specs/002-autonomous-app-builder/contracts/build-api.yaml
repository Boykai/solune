# Build API Contract

openapi: "3.1.0"
info:
  title: App Build API
  version: "0.5.0"
  description: |
    Contracts for the end-to-end build orchestration and iteration tools.
    These are primarily agent tools exposed via the Microsoft Agent Framework,
    documented here as contracts for consistency.

paths:
  /api/apps/{app_name}/build:
    post:
      operationId: buildApp
      summary: Trigger a full app build from template
      description: |
        End-to-end orchestration: creates app from template, configures pipeline,
        creates parent issue, and launches pipeline. Primarily invoked by the AI
        agent via the `build_app()` tool, but also available as a direct API call.
      parameters:
        - name: app_name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildAppRequest"
      responses:
        "202":
          description: Build started (async operation)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildAppResponse"
        "400":
          description: Invalid request
        "404":
          description: Template not found
        "409":
          description: App name already exists

  /api/apps/{app_name}/iterate:
    post:
      operationId: iterateOnApp
      summary: Create an issue and launch pipeline for an existing app
      description: |
        Creates a new issue in the app's project describing the requested change,
        then launches the appropriate pipeline to implement it.
      parameters:
        - name: app_name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IterateRequest"
      responses:
        "202":
          description: Iteration started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IterateResponse"
        "404":
          description: App not found
        "409":
          description: A pipeline is already running for this app

components:
  schemas:
    BuildAppRequest:
      type: object
      required: [template_id]
      properties:
        template_id:
          type: string
          description: Template to scaffold from
          example: "dashboard-react"
        description:
          type: string
          default: ""
          description: App description for issue creation
          example: "Stock tracking dashboard with real-time charts"
        difficulty_override:
          type: string
          nullable: true
          enum: [S, M, L, XL]
          description: Override the template's default difficulty
        context_variables:
          type: object
          additionalProperties:
            type: string
          description: Variables for template rendering
          example:
            app_name: "stock-tracker"
            port: "8080"
        create_project:
          type: boolean
          default: true
          description: Whether to create a GitHub Project V2 board

    BuildAppResponse:
      type: object
      required: [app_name, message]
      properties:
        app_name:
          type: string
          example: "stock-tracker"
        pipeline_run_id:
          type: integer
          description: Pipeline run ID for tracking
        issue_url:
          type: string
          description: URL of the created parent issue
        project_url:
          type: string
          nullable: true
          description: URL of the GitHub Project V2 board
        message:
          type: string
          example: "App 'stock-tracker' build started with dashboard-react template"

    IterateRequest:
      type: object
      required: [change_description]
      properties:
        change_description:
          type: string
          description: Natural language description of the desired change
          example: "Add dark mode support to the dashboard"

    IterateResponse:
      type: object
      required: [message]
      properties:
        issue_url:
          type: string
          nullable: true
          description: URL of the created issue
        pipeline_run_id:
          type: integer
          nullable: true
          description: Pipeline run ID for tracking
        message:
          type: string
          example: "Issue created and pipeline launched for 'Add dark mode support'"
