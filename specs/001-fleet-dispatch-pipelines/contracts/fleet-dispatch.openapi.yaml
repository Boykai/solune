openapi: 3.1.0
info:
  title: Fleet Dispatch CLI Orchestration Contract
  version: 1.0.0
  description: >
    Design-time contract for the planned GitHub CLI fleet-dispatch workflow.
    It models the user-visible operations the shell entry point must support.

paths:
  /fleet-dispatches:
    post:
      summary: Launch a full fleet dispatch for a parent issue
      operationId: createFleetDispatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFleetDispatchRequest'
      responses:
        '202':
          description: Dispatch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FleetDispatchSummary'
        '400':
          description: Invalid config, auth, or prerequisite failure
  /fleet-dispatches/{dispatchId}:
    get:
      summary: Read current fleet dispatch status
      operationId: getFleetDispatch
      parameters:
        - in: path
          name: dispatchId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Current dispatch status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FleetDispatchSummary'
  /fleet-dispatches/{dispatchId}/agents/{agentSlug}/retry:
    post:
      summary: Re-dispatch a single agent against an existing sub-issue
      operationId: retryFleetDispatchAgent
      parameters:
        - in: path
          name: dispatchId
          required: true
          schema:
            type: string
        - in: path
          name: agentSlug
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetryAgentRequest'
      responses:
        '202':
          description: Retry accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DispatchRecord'

components:
  schemas:
    CreateFleetDispatchRequest:
      type: object
      required:
        - owner
        - repo
        - parentIssueNumber
        - pipelineConfigPath
        - baseRef
        - errorStrategy
      properties:
        owner:
          type: string
        repo:
          type: string
        parentIssueNumber:
          type: integer
          minimum: 1
        pipelineConfigPath:
          type: string
        baseRef:
          type: string
        errorStrategy:
          type: string
          enum: [fail-fast, continue]
        resumeIfExisting:
          type: boolean
          default: false
    RetryAgentRequest:
      type: object
      required:
        - subIssueNumber
      properties:
        subIssueNumber:
          type: integer
          minimum: 1
        overrideTemplatePath:
          type: string
        overrideModel:
          type: string
    FleetDispatchSummary:
      type: object
      required:
        - dispatchId
        - parentIssueNumber
        - status
        - startedAt
        - records
      properties:
        dispatchId:
          type: string
        parentIssueNumber:
          type: integer
        status:
          type: string
          enum: [pending, running, completed, failed, partial]
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        elapsedSeconds:
          type: integer
          minimum: 0
        records:
          type: array
          items:
            $ref: '#/components/schemas/DispatchRecord'
    DispatchRecord:
      type: object
      required:
        - groupId
        - agentSlug
        - subIssueNumber
        - status
        - attempt
      properties:
        groupId:
          type: string
        agentSlug:
          type: string
        subIssueNumber:
          type: integer
          minimum: 1
        taskId:
          type: string
        attempt:
          type: integer
          minimum: 1
        status:
          type: string
          enum: [pending, queued, in_progress, completed, failed, timed_out, skipped]
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        errorMessage:
          type: string
