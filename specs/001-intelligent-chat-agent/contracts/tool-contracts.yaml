# Tool Contracts: Complete v0.2.0 — Intelligent Chat Agent
#
# Defines the interface contracts for all new agent tools added in this feature.
# These are internal Python tool contracts (not REST endpoints) because the tools
# are invoked by the Microsoft Agent Framework, not directly by HTTP clients.
#
# The existing REST API endpoints (POST /chat/messages, POST /chat/messages/stream)
# remain unchanged — they handle tool results via the ChatMessage response model.

components:
  schemas:

    # ─── Shared Types ───

    ToolResult:
      type: object
      description: >
        Structured result returned by all agent tools. Matches the TypedDict
        defined in agent_tools.py.
      properties:
        content:
          type: string
          description: Human-readable text shown to the user.
        action_type:
          type: string
          nullable: true
          description: >
            Maps to ActionType enum (task_create, status_update, project_select,
            issue_create, pipeline_launch). Null for informational-only results.
        action_data:
          type: object
          nullable: true
          description: Structured payload for the frontend to process.

    DifficultyLevel:
      type: string
      enum: [XS, S, M, L, XL]
      description: Project complexity rating scale.

    PresetId:
      type: string
      enum: [github-copilot, easy, medium, hard, expert]
      description: Pipeline preset identifier.

  # ─── Tool Contracts ───

  tools:

    assess_difficulty:
      description: >
        LLM-driven complexity assessment of a project idea. The agent evaluates
        the user's project description and assigns a difficulty level.
      parameters:
        difficulty:
          type: string
          required: true
          description: >
            The assessed difficulty level (XS, S, M, L, or XL). The agent
            determines this based on the conversation context.
        reasoning:
          type: string
          required: true
          description: >
            Explanation of why this difficulty level was chosen. Includes
            factors like number of services, integration complexity, etc.
      returns:
        $ref: '#/components/schemas/ToolResult'
        description: >
          Returns ToolResult with content containing the reasoning.
          action_type is null (informational only).
          Side effect: Sets session.state["assessed_difficulty"].
      examples:
        - name: Medium complexity project
          parameters:
            difficulty: "M"
            reasoning: "This project involves a React frontend with Azure backend, 2-3 API integrations, and a database. Moderate complexity."
          returns:
            content: "I've assessed this as **Medium (M)** complexity. This project involves a React frontend with Azure backend, 2-3 API integrations, and a database. This maps to the **medium** pipeline preset."
            action_type: null
            action_data: null

    select_pipeline_preset:
      description: >
        Selects the appropriate pipeline preset based on assessed difficulty.
        Reads presets from PipelineService and returns matched preset details.
      parameters:
        difficulty:
          type: string
          required: true
          description: >
            Difficulty level to map to a preset. Should match the value from
            assess_difficulty. Falls back to "medium" if unrecognized.
        project_name:
          type: string
          required: true
          description: The project name for context.
      returns:
        $ref: '#/components/schemas/ToolResult'
        description: >
          Returns ToolResult with content describing the selected preset
          (stages, agents, capabilities). action_type is null.
          Side effect: Sets session.state["selected_preset_id"].
      examples:
        - name: Select medium preset
          parameters:
            difficulty: "M"
            project_name: "Stock Tracker App"
          returns:
            content: "Selected **medium** pipeline for Stock Tracker App. This includes: Spec Kit planning, Copilot implementation, and review verification across 5 stages."
            action_type: null
            action_data: null

    create_project_issue:
      description: >
        Creates a GitHub issue for the project. Respects CHAT_AUTO_CREATE_ENABLED
        config — when disabled, returns a proposal instead of creating.
      parameters:
        title:
          type: string
          required: true
          description: Issue title for the GitHub issue.
        body:
          type: string
          required: true
          description: >
            Issue body in markdown format. Should include project description,
            assessed difficulty, and selected pipeline preset.
      returns:
        $ref: '#/components/schemas/ToolResult'
        description: >
          When auto-create enabled: Returns ToolResult with action_type="issue_create"
          and action_data containing issue_number, issue_url, preset_id.
          When auto-create disabled: Returns proposal with action_type=null.
      examples:
        - name: Auto-create enabled
          parameters:
            title: "Stock Tracker App"
            body: "## Project\nA stock tracking application with React and Azure.\n\n**Difficulty**: M\n**Preset**: medium"
          returns:
            content: "Created issue #42: Stock Tracker App — https://github.com/user/repo/issues/42"
            action_type: "issue_create"
            action_data:
              issue_number: 42
              issue_url: "https://github.com/user/repo/issues/42"
              preset_id: "medium"
              project_name: "Stock Tracker App"
        - name: Auto-create disabled
          parameters:
            title: "Stock Tracker App"
            body: "## Project\n..."
          returns:
            content: "I recommend creating an issue titled 'Stock Tracker App'. Autonomous creation is currently disabled. Please create the issue manually or enable CHAT_AUTO_CREATE_ENABLED."
            action_type: null
            action_data: null

    launch_pipeline:
      description: >
        Launches the selected pipeline for a project. Should be called after
        create_project_issue succeeds.
      parameters:
        pipeline_id:
          type: string
          required: false
          description: >
            Pipeline configuration ID to launch. If not provided, uses
            session.state["pipeline_id"] or creates a new pipeline from
            the selected preset.
      returns:
        $ref: '#/components/schemas/ToolResult'
        description: >
          Returns ToolResult with action_type="pipeline_launch" and
          action_data containing pipeline_id, preset, and stages.
      examples:
        - name: Successful launch
          parameters:
            pipeline_id: "pipe-abc-123"
          returns:
            content: "Launched pipeline pipe-abc-123 with medium preset. Stages: Backlog → Ready → In progress → In review → Done"
            action_type: "pipeline_launch"
            action_data:
              pipeline_id: "pipe-abc-123"
              preset: "medium"
              stages: ["Backlog", "Ready", "In progress", "In review", "Done"]

    load_mcp_tools:
      description: >
        Internal function (not a @tool) that loads MCP server configurations
        for a project. Called during agent initialization.
      parameters:
        project_id:
          type: string
          required: true
          description: Project ID to load MCP configs for.
        db:
          type: object
          required: true
          description: aiosqlite.Connection for database access.
      returns:
        type: object
        description: >
          Dict mapping MCP server names to configuration dicts compatible
          with GitHubCopilotOptions.mcp_servers. Empty dict if no MCP
          tools configured or on error.
      examples:
        - name: Project with MCP tools
          parameters:
            project_id: "proj-123"
          returns:
            my-mcp-server:
              endpoint_url: "https://mcp.example.com/api"
              config: '{"key": "value"}'
        - name: Project without MCP tools
          parameters:
            project_id: "proj-456"
          returns: {}
