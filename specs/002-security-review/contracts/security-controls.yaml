# Security Controls Contract
#
# Documents the security controls, validation rules, and behavioral guarantees
# that the Solune application must satisfy based on the security audit.
# Defined as OpenAPI-style YAML for consistency with the speckit workflow.

openapi: "3.1.0"
info:
  title: Security Controls Contract
  version: "1.0.0"
  description: >
    Behavioral contract for security controls identified in the
    Security, Privacy & Vulnerability Audit. Covers authentication,
    authorization, encryption, rate limiting, container hardening,
    and transport security.

components:
  schemas:
    # --- Authentication & Session Security ---

    SessionCookie:
      type: object
      description: Session cookie attributes for all authenticated responses
      required:
        - key
        - httponly
        - secure
        - samesite
        - path
      properties:
        key:
          type: string
          const: "session_id"
        httponly:
          type: boolean
          const: true
        secure:
          type: boolean
          description: >
            Must be true in production. Auto-detected from frontend_url
            (HTTPS prefix) or explicit COOKIE_SECURE env var.
        samesite:
          type: string
          const: "strict"
        max_age:
          type: integer
          default: 28800
          description: Cookie lifetime in seconds (default 8 hours)
        path:
          type: string
          const: "/"

    OAuthCallbackResponse:
      type: object
      description: >
        OAuth callback redirects to frontend with session cookie set.
        No credentials appear in the redirect URL.
      required:
        - redirect_url
        - session_cookie
      properties:
        redirect_url:
          type: string
          pattern: "^https?://[^?#]+/auth/callback$"
          description: >
            Frontend callback URL with NO query parameters containing
            credentials. URL must not include session_token, access_token,
            code, or any other credential.
        session_cookie:
          $ref: "#/components/schemas/SessionCookie"

    DevLoginRequest:
      type: object
      description: >
        Development-only login. Credentials accepted ONLY in POST body,
        never in URL query parameters.
      required:
        - github_token
      properties:
        github_token:
          type: string
          minLength: 1
          maxLength: 255
          description: GitHub Personal Access Token

    # --- Startup Validation ---

    ProductionStartupRequirements:
      type: object
      description: >
        Environment variables required for production (non-debug) startup.
        Missing any of these causes startup failure with descriptive error.
      required:
        - encryption_key
        - github_webhook_secret
        - session_secret_key
        - cookie_secure
        - admin_github_user_id
      properties:
        encryption_key:
          type: string
          description: Fernet encryption key for at-rest token encryption
        github_webhook_secret:
          type: string
          description: HMAC-SHA256 secret for GitHub webhook signature verification
        session_secret_key:
          type: string
          minLength: 64
          description: >
            Session signing key. Minimum 64 characters in all modes.
            Generate with: openssl rand -hex 32
        cookie_secure:
          type: boolean
          const: true
          description: >
            effective_cookie_secure must be true. Auto-detected from
            HTTPS frontend_url or explicit COOKIE_SECURE=true.
        admin_github_user_id:
          type: integer
          description: Numeric GitHub user ID for admin access

    CorsOrigin:
      type: string
      pattern: "^https?://[a-zA-Z0-9._-]+(:[0-9]+)?$"
      description: >
        Each CORS origin must include a scheme (http/https) and hostname.
        Malformed origins cause startup failure.

    # --- Authorization ---

    ProjectAccessCheck:
      type: object
      description: >
        Centralized project authorization check. Applied as a FastAPI
        dependency to all endpoints accepting project_id.
      required:
        - project_id
        - session
      properties:
        project_id:
          type: string
          description: Target project identifier
        session:
          type: object
          description: Authenticated user session from cookie
          required:
            - access_token
            - github_username
          properties:
            access_token:
              type: string
            github_username:
              type: string

    ProjectAccessDenied:
      type: object
      description: Response when user does not own the target project
      properties:
        detail:
          type: string
          const: "You do not have access to this project"
        status_code:
          type: integer
          const: 403

    # --- Rate Limiting ---

    RateLimitConfig:
      type: object
      description: Rate limiting configuration per endpoint type
      properties:
        oauth_callback:
          type: object
          properties:
            limit:
              type: string
              const: "20/minute"
            key_type:
              type: string
              const: "ip"
        ai_endpoints:
          type: object
          description: Chat, agents, workflow endpoints
          properties:
            key_type:
              type: string
              const: "user"
            key_resolution_order:
              type: array
              items:
                type: string
              example:
                - "github_user_id"
                - "user:{session_id}"
                - "ip:{remote_address}"

    RateLimitResponse:
      type: object
      description: Response when rate limit exceeded
      properties:
        status_code:
          type: integer
          const: 429
        detail:
          type: string
          example: "Rate limit exceeded"

    # --- Webhook Verification ---

    WebhookVerification:
      type: object
      description: >
        Webhook signature verification. NEVER conditional on debug mode.
        Missing secret causes rejection, not bypass.
      required:
        - always_verify
      properties:
        always_verify:
          type: boolean
          const: true
          description: Verification is unconditional
        github:
          type: object
          properties:
            algorithm:
              type: string
              const: "HMAC-SHA256"
            comparison:
              type: string
              const: "hmac.compare_digest"
        signal:
          type: object
          properties:
            comparison:
              type: string
              const: "hmac.compare_digest"

  # --- Behavioral Contracts ---

  x-behavioral-contracts:
    authentication:
      session_transport:
        - "Session tokens MUST be transported via HttpOnly cookies only"
        - "Session tokens MUST NOT appear in URLs, query parameters, or fragments"
        - "OAuth callback redirect URL MUST NOT contain credentials"
        - "Frontend MUST NOT read credentials from URL parameters"
        - "Dev login endpoint MUST accept credentials in POST body only"
        - "Dev login endpoint MUST be disabled in production (return 404)"

    startup_validation:
        - "Production startup MUST fail if ENCRYPTION_KEY is not set"
        - "Production startup MUST fail if GITHUB_WEBHOOK_SECRET is not set"
        - "Startup MUST fail if SESSION_SECRET_KEY is shorter than 64 characters"
        - "Production startup MUST fail if cookies are not configured as Secure"
        - "Startup MUST fail if any CORS origin is malformed (missing scheme or hostname)"
        - "API docs MUST be gated by ENABLE_DOCS, not DEBUG"

    authorization:
        - "Every endpoint accepting project_id MUST call verify_project_access"
        - "Unauthorized project access MUST return 403 Forbidden"
        - "WebSocket connections to unowned projects MUST be rejected before data transmission"
        - "Authorization check MUST be centralized (single dependency, not per-endpoint)"

    encryption:
        - "OAuth tokens MUST be encrypted at rest when ENCRYPTION_KEY is set"
        - "Legacy plaintext tokens MUST be detected by known prefix patterns"
        - "Encryption MUST use Fernet (AES-128-CBC + HMAC-SHA256)"

    webhook_security:
        - "Webhook signature verification MUST NOT be conditional on debug mode"
        - "Missing webhook secret MUST cause request rejection, not bypass"
        - "All secret comparisons MUST use constant-time functions (hmac.compare_digest)"

    container_security:
        - "All containers MUST run as non-root users"
        - "Frontend MUST use a dedicated nginx-app user"
        - "Exposed ports MUST be non-privileged (>1024)"
        - "Docker services MUST bind to 127.0.0.1 in development"

    transport_security:
        - "nginx MUST include Content-Security-Policy header"
        - "nginx MUST include Strict-Transport-Security header"
        - "nginx MUST include Referrer-Policy header"
        - "nginx MUST include Permissions-Policy header"
        - "nginx MUST NOT disclose server version (server_tokens off)"
        - "nginx MUST NOT include deprecated X-XSS-Protection header"

    data_protection:
        - "Database directory MUST have 0700 permissions"
        - "Database files MUST have 0600 permissions"
        - "Data volume MUST be mounted outside application root"
        - "Chat history MUST NOT persist message content in localStorage"
        - "Chat data MUST be cleared on logout"

    rate_limiting:
        - "AI-intensive endpoints MUST enforce per-user rate limits"
        - "OAuth callback MUST enforce per-IP rate limits"
        - "Rate-limited responses MUST return HTTP 429"

    error_handling:
        - "GraphQL API errors MUST be logged but NOT exposed to clients"
        - "API responses MUST contain only generic error messages"

    supply_chain:
        - "GitHub Actions workflows MUST declare minimum permissions"
        - "Default workflow permissions MUST be empty (permissions: {})"

    client_security:
        - "Avatar URLs MUST be validated for HTTPS protocol"
        - "Avatar URLs MUST be validated against allowed hostname whitelist"
        - "Invalid avatar URLs MUST fall back to placeholder image"
