# MCP Tool Contracts: Solune MCP Server
#
# This file defines the MCP tool schemas in an OpenAPI-inspired YAML format.
# Each tool maps to an @mcp.tool() decorated async function.
# The MCP SDK auto-generates JSON Schema from Python type hints + docstrings,
# so this contract serves as the design specification — the implementation
# derives schemas from the Python source code.
#
# Transport: Streamable HTTP (POST /api/v1/mcp)
# Auth: Bearer token (GitHub PAT) in Authorization header
# Response format: JSON (json_response=True on FastMCP)

server:
  name: solune
  version: 0.4.0
  transport: streamable-http
  endpoint: /api/v1/mcp
  auth:
    type: bearer
    description: GitHub Personal Access Token
    header: Authorization

# ============================================================================
# Tier 1 Tools — Projects & Board (FR-011 to FR-014)
# ============================================================================

tools:
  # --- Projects & Board ---

  list_projects:
    description: >
      List all GitHub projects accessible to the authenticated user.
      Returns project names, IDs, and URLs.
    parameters: {}
    returns:
      type: object
      properties:
        projects:
          type: array
          items:
            type: object
            properties:
              project_id: { type: string, description: "GitHub Project V2 node ID" }
              name: { type: string }
              url: { type: string }
    requirement: FR-011
    service: GitHubProjectsService.list_user_projects()

  get_project:
    description: >
      Get detailed information about a specific GitHub project,
      including status columns and configuration.
    parameters:
      project_id:
        type: string
        required: true
        description: "GitHub Project V2 node ID"
    returns:
      type: object
      properties:
        project_id: { type: string }
        name: { type: string }
        url: { type: string }
        columns:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              id: { type: string }
    requirement: FR-012
    access_control: verify_project_access(project_id)
    service: GitHubProjectsService.get_project()

  get_board:
    description: >
      Get the full kanban board state for a project, including all
      columns and their items with status, assignees, and labels.
    parameters:
      project_id:
        type: string
        required: true
        description: "GitHub Project V2 node ID"
    returns:
      type: object
      properties:
        project_id: { type: string }
        columns:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              items:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    title: { type: string }
                    status: { type: string }
                    assignees: { type: array, items: { type: string } }
    requirement: FR-013
    access_control: verify_project_access(project_id)
    service: GitHubProjectsService.get_board_data()

  get_project_tasks:
    description: >
      Get all items and issues in a project, including their status,
      assignees, labels, and metadata.
    parameters:
      project_id:
        type: string
        required: true
        description: "GitHub Project V2 node ID"
    returns:
      type: object
      properties:
        tasks:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              title: { type: string }
              status: { type: string }
              type: { type: string, enum: [issue, draft_issue, pull_request] }
              labels: { type: array, items: { type: string } }
    requirement: FR-014
    access_control: verify_project_access(project_id)
    service: GitHubProjectsService.get_board_data()

  # --- Issue & Task Creation (FR-015 to FR-016) ---

  create_task:
    description: >
      Create a new task: creates a GitHub issue, adds it to the project
      board, and generates sub-issues as configured. Delegates to the
      same logic as POST /tasks.
    parameters:
      project_id:
        type: string
        required: true
        description: "GitHub Project V2 node ID"
      title:
        type: string
        required: true
        description: "Task title"
      description:
        type: string
        required: true
        description: "Task description / body"
    returns:
      type: object
      properties:
        issue_number: { type: integer }
        issue_url: { type: string }
        sub_issues: { type: array, items: { type: object } }
    requirement: FR-015
    access_control: verify_project_access(project_id)
    service: create_task logic (api/tasks.py pattern)

  create_issue:
    description: >
      Create a new GitHub issue with optional labels and add it to a project.
    parameters:
      project_id:
        type: string
        required: true
        description: "GitHub Project V2 node ID"
      title:
        type: string
        required: true
        description: "Issue title"
      body:
        type: string
        required: true
        description: "Issue body (markdown)"
      labels:
        type: array
        required: false
        items: { type: string }
        description: "Labels to apply to the issue"
    returns:
      type: object
      properties:
        issue_number: { type: integer }
        issue_url: { type: string }
    requirement: FR-016
    access_control: verify_project_access(project_id)
    service: GitHubProjectsService.create_issue() + add_issue_to_project()

  # --- Pipelines (FR-017 to FR-020) ---

  list_pipelines:
    description: >
      List available pipeline configurations for a project.
    parameters:
      project_id:
        type: string
        required: true
        description: "GitHub Project V2 node ID"
    returns:
      type: object
      properties:
        pipelines:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              name: { type: string }
              description: { type: string }
              difficulty: { type: string }
    requirement: FR-017
    access_control: verify_project_access(project_id)
    service: Pipeline configuration query

  launch_pipeline:
    description: >
      Launch a development pipeline: creates a parent issue, generates
      sub-issues, and starts agent assignments. Delegates to
      execute_pipeline_launch().
    parameters:
      project_id:
        type: string
        required: true
        description: "GitHub Project V2 node ID"
      pipeline_id:
        type: string
        required: true
        description: "Pipeline configuration ID"
      issue_description:
        type: string
        required: true
        description: "Description of the work to be done"
    returns:
      type: object
      properties:
        parent_issue_number: { type: integer }
        parent_issue_url: { type: string }
        sub_issues: { type: array, items: { type: object } }
        pipeline_state: { type: string }
    requirement: FR-018
    access_control: verify_project_access(project_id)
    service: execute_pipeline_launch()

  get_pipeline_states:
    description: >
      Get all active pipeline states for a project, including stage
      progress, agent assignments, and current status.
    parameters:
      project_id:
        type: string
        required: true
        description: "GitHub Project V2 node ID"
    returns:
      type: object
      properties:
        pipeline_states:
          type: array
          items:
            type: object
            properties:
              issue_number: { type: integer }
              status: { type: string }
              stages: { type: array, items: { type: object } }
              created_at: { type: string, format: datetime }
    requirement: FR-019
    access_control: verify_project_access(project_id)
    service: Pipeline state store query

  retry_pipeline:
    description: >
      Retry a failed agent assignment in a pipeline.
    parameters:
      project_id:
        type: string
        required: true
        description: "GitHub Project V2 node ID"
      issue_number:
        type: integer
        required: true
        description: "Issue number of the pipeline to retry"
    returns:
      type: object
      properties:
        success: { type: boolean }
        pipeline_state: { type: string }
        message: { type: string }
    requirement: FR-020
    access_control: verify_project_access(project_id)
    service: Pipeline retry logic

  # --- Activity & Status (FR-021 to FR-022) ---

  get_activity:
    description: >
      Get a paginated activity feed for a project.
    parameters:
      project_id:
        type: string
        required: true
        description: "GitHub Project V2 node ID"
      limit:
        type: integer
        required: false
        default: 20
        description: "Maximum number of activity entries to return"
    returns:
      type: object
      properties:
        activities:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              type: { type: string }
              description: { type: string }
              timestamp: { type: string, format: datetime }
    requirement: FR-021
    access_control: verify_project_access(project_id)
    service: Activity query

  update_item_status:
    description: >
      Move an item to a different status column on the project board.
    parameters:
      project_id:
        type: string
        required: true
        description: "GitHub Project V2 node ID"
      item_id:
        type: string
        required: true
        description: "Project item node ID"
      status:
        type: string
        required: true
        description: "Target status column name"
    returns:
      type: object
      properties:
        success: { type: boolean }
        item_id: { type: string }
        new_status: { type: string }
    requirement: FR-022
    access_control: verify_project_access(project_id)
    service: GitHubProjectsService.update_item_status()

# ============================================================================
# Tier 2 Tools — Management (FR-023 to FR-028)
# ============================================================================

  # --- Agent Management (FR-023) ---

  list_agents:
    description: >
      List all custom GitHub agents configured for a project.
    parameters:
      project_id:
        type: string
        required: true
    returns:
      type: object
      properties:
        agents:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              name: { type: string }
              model: { type: string }
              instructions: { type: string }
    requirement: FR-023
    access_control: verify_project_access(project_id)
    service: AgentsService.list_agents()

  create_agent:
    description: >
      Create a new custom GitHub agent for a project. Creates a branch,
      commits the agent configuration, and opens a PR.
    parameters:
      project_id:
        type: string
        required: true
      name:
        type: string
        required: true
        description: "Agent name"
      instructions:
        type: string
        required: true
        description: "Agent instructions/system prompt"
      model:
        type: string
        required: false
        description: "AI model to use (default: project default)"
    returns:
      type: object
      properties:
        agent_id: { type: string }
        pr_url: { type: string }
    requirement: FR-023
    access_control: verify_project_access(project_id)
    service: AgentsService.create_agent()

  # --- App Management (FR-024) ---

  list_apps:
    description: >
      List all managed applications.
    parameters: {}
    returns:
      type: object
      properties:
        apps:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              status: { type: string }
              url: { type: string }
    requirement: FR-024
    service: App listing query

  get_app_status:
    description: >
      Get health check status for a specific managed application.
    parameters:
      app_name:
        type: string
        required: true
    returns:
      type: object
      properties:
        name: { type: string }
        status: { type: string, enum: [healthy, degraded, down, unknown] }
        last_check: { type: string, format: datetime }
        details: { type: object }
    requirement: FR-024
    service: App health check

  create_app:
    description: >
      Scaffold a new managed application with optional pipeline launch.
    parameters:
      name:
        type: string
        required: true
      owner:
        type: string
        required: true
        description: "GitHub owner/org for the new app repo"
      template:
        type: string
        required: false
        description: "Template to use for scaffolding"
      pipeline_id:
        type: string
        required: false
        description: "Pipeline to launch after creation"
    returns:
      type: object
      properties:
        app_name: { type: string }
        repo_url: { type: string }
        pipeline_state: { type: string, nullable: true }
    requirement: FR-024
    service: App creation + optional pipeline launch

  # --- Maintenance (FR-025) ---

  list_chores:
    description: >
      List recurring maintenance tasks (chores) for a project.
    parameters:
      project_id:
        type: string
        required: true
    returns:
      type: object
      properties:
        chores:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              name: { type: string }
              schedule: { type: string }
              last_run: { type: string, format: datetime, nullable: true }
    requirement: FR-025
    access_control: verify_project_access(project_id)
    service: Chore listing query

  trigger_chore:
    description: >
      Manually trigger a recurring maintenance chore.
    parameters:
      project_id:
        type: string
        required: true
      chore_id:
        type: string
        required: true
    returns:
      type: object
      properties:
        success: { type: boolean }
        result: { type: string }
    requirement: FR-025
    access_control: verify_project_access(project_id)
    service: Chore execution

  # --- Repository Metadata (FR-026) ---

  get_metadata:
    description: >
      Get repository context including labels, branches, milestones,
      and collaborators.
    parameters:
      owner:
        type: string
        required: true
        description: "Repository owner"
      repo:
        type: string
        required: true
        description: "Repository name"
    returns:
      type: object
      properties:
        labels: { type: array, items: { type: string } }
        branches: { type: array, items: { type: string } }
        milestones: { type: array, items: { type: object } }
        collaborators: { type: array, items: { type: string } }
    requirement: FR-026
    service: GitHubProjectsService (RepositoryMixin)

  # --- Cleanup (FR-027) ---

  cleanup_preflight:
    description: >
      Preview stale branches and pull requests that could be cleaned up.
    parameters:
      project_id:
        type: string
        required: true
    returns:
      type: object
      properties:
        stale_branches: { type: array, items: { type: object } }
        stale_prs: { type: array, items: { type: object } }
        total_candidates: { type: integer }
    requirement: FR-027
    access_control: verify_project_access(project_id)
    service: Cleanup preflight logic

  # --- Chat (FR-028) ---

  send_chat_message:
    description: >
      Send a natural language message to Solune's AI agent and receive
      a response. Enables conversational interaction with the platform.
    parameters:
      project_id:
        type: string
        required: true
      message:
        type: string
        required: true
        description: "Natural language message to the AI agent"
    returns:
      type: object
      properties:
        response: { type: string }
        action_type: { type: string, nullable: true }
        action_data: { type: object, nullable: true }
    requirement: FR-028
    access_control: verify_project_access(project_id)
    service: ChatAgentService.run()

# ============================================================================
# Resources (FR-031 to FR-033)
# ============================================================================

resources:
  pipelines:
    uri_template: "solune://projects/{project_id}/pipelines"
    description: "All pipeline states for a project"
    mime_type: application/json
    requirement: FR-031

  board:
    uri_template: "solune://projects/{project_id}/board"
    description: "Current board state for a project"
    mime_type: application/json
    requirement: FR-031

  activity:
    uri_template: "solune://projects/{project_id}/activity"
    description: "Recent activity feed for a project"
    mime_type: application/json
    requirement: FR-031

# ============================================================================
# Prompts (FR-036)
# ============================================================================

prompts:
  create-project:
    description: "Guided project creation flow"
    arguments:
      - name: project_name
        description: "Name for the new project"
        required: false
    requirement: FR-036

  pipeline-status:
    description: "Check all running pipelines across projects"
    arguments:
      - name: project_id
        description: "Filter to a specific project (optional)"
        required: false
    requirement: FR-036

  daily-standup:
    description: "Summarize recent activity across the user's projects"
    arguments:
      - name: days
        description: "Number of days to look back (default: 1)"
        required: false
    requirement: FR-036

# ============================================================================
# Configuration Endpoint (FR-037)
# ============================================================================

endpoints:
  mcp_config:
    path: /api/v1/mcp/config
    method: GET
    description: >
      Returns MCP connection configuration for external agents.
      No authentication required.
    returns:
      type: object
      properties:
        server_name: { type: string }
        url: { type: string }
        transport: { type: string, enum: [streamable-http] }
        auth:
          type: object
          properties:
            type: { type: string, enum: [bearer] }
            description: { type: string }
    requirement: FR-037
