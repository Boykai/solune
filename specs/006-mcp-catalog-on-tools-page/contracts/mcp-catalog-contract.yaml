openapi: 3.1.0
info:
  title: Solune MCP Catalog API
  version: "1.0.0"
  description: >-
    Planning contract for browsing and importing external MCP servers into the
    existing Tools page workflow.
servers:
  - url: /api/v1
paths:
  /tools/{project_id}/catalog:
    get:
      summary: Browse/search MCP catalog servers for a project
      operationId: browseMcpCatalog
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
        - name: query
          in: query
          required: false
          schema:
            type: string
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Catalog results for the current project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogMcpServerListResponse"
        "400":
          description: Invalid query parameters or project mapping
        "502":
          description: Upstream catalog returned an invalid/unexpected response
        "503":
          description: Upstream catalog unavailable and no stale cache exists
  /tools/{project_id}/catalog/import:
    post:
      summary: Import a catalog MCP server into the current project's tool archive
      operationId: importCatalogMcpServer
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportCatalogMcpRequest"
      responses:
        "201":
          description: Catalog server imported as an MCP tool configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/McpToolConfigResponse"
        "409":
          description: Tool name or MCP server entry already exists for the project
        "422":
          description: Catalog install config could not be mapped into a valid MCP snippet
components:
  schemas:
    CatalogInstallConfig:
      type: object
      required:
        - transport
      properties:
        transport:
          type: string
          enum: [http, sse, stdio, local]
        url:
          type:
            - string
            - "null"
        command:
          type:
            - string
            - "null"
        args:
          type: array
          items:
            type: string
        env:
          type: object
          additionalProperties: true
        headers:
          type: object
          additionalProperties: true
        tools:
          type: array
          items:
            type: string
    CatalogMcpServer:
      type: object
      required:
        - id
        - name
        - description
        - server_type
        - install_config
        - already_installed
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        repo_url:
          type:
            - string
            - "null"
          format: uri
        category:
          type:
            - string
            - "null"
        server_type:
          type: string
        install_config:
          $ref: "#/components/schemas/CatalogInstallConfig"
        quality_score:
          type:
            - string
            - "null"
        already_installed:
          type: boolean
    CatalogMcpServerListResponse:
      type: object
      required:
        - servers
        - count
      properties:
        servers:
          type: array
          items:
            $ref: "#/components/schemas/CatalogMcpServer"
        count:
          type: integer
        query:
          type:
            - string
            - "null"
        category:
          type:
            - string
            - "null"
    ImportCatalogMcpRequest:
      type: object
      required:
        - catalog_server_id
      properties:
        catalog_server_id:
          type: string
    McpToolConfigResponse:
      type: object
      required:
        - id
        - name
        - description
        - endpoint_url
        - config_content
        - sync_status
        - sync_error
        - github_repo_target
        - is_active
        - created_at
        - updated_at
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        endpoint_url:
          type: string
        config_content:
          type: string
        sync_status:
          type: string
        sync_error:
          type: string
        synced_at:
          type:
            - string
            - "null"
        github_repo_target:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
