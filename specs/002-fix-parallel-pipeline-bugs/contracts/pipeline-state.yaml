# Pipeline State Property Contracts
#
# Internal Python property contracts — not an HTTP API.
# Defined as OpenAPI-style YAML for consistency with the speckit workflow.
# Documents the property signatures, return shapes, and behavioral guarantees
# for PipelineState model properties modified by this feature.

openapi: "3.1.0"
info:
  title: Pipeline State Property Contracts
  version: "1.0.0"
  description: >
    Internal property contracts for PipelineState model in
    src/services/workflow_orchestrator/models.py. Documents the new
    current_agents property and the fixed is_complete property behavior.

components:
  schemas:
    PipelineGroupInfo:
      type: object
      description: >
        Runtime tracking of an execution group within a pipeline.
        Existing dataclass — no changes.
      properties:
        group_id:
          type: string
          description: Unique group identifier
        execution_mode:
          type: string
          enum: ["sequential", "parallel"]
          description: How agents in this group are executed
        agents:
          type: array
          items:
            type: string
          description: Ordered list of agent slugs in this group
        agent_statuses:
          type: object
          additionalProperties:
            type: string
            enum: ["pending", "active", "completed", "failed"]
          description: >
            Maps agent slug to current status. Populated for parallel groups
            at initialization; empty for sequential groups.

    CurrentAgentsResult:
      type: array
      items:
        type: string
      description: >
        List of agent slugs active in the current group.
        For parallel groups: all agents in the group.
        For sequential groups: single-element list with the current agent.
        Empty list when no current agents (pipeline complete or no groups).

  # Property interface contracts
  x-property-contracts:
    module: src.services.workflow_orchestrator.models
    class: PipelineState

    properties:
      current_agents:
        status: NEW
        description: >
          Returns ALL agents in the current group when execution_mode is
          "parallel". Returns a single-element list for sequential groups.
          Skips empty groups. Falls back to [current_agent] when no groups
          are configured.
        signature: |
          @property
          def current_agents(self) -> list[str]
        returns:
          type: list[str]
          description: List of agent slugs in the current execution context
          guarantees:
            - Parallel group returns all agents (len == len(group.agents))
            - Sequential group returns at most one agent (len <= 1)
            - Empty groups are transparently skipped
            - Returns empty list when pipeline is complete
            - Falls back to [current_agent] for non-grouped pipelines
        examples:
          - scenario: "Parallel group with 3 agents"
            groups:
              - group_id: "g2"
                execution_mode: "parallel"
                agents: ["linter", "archivist", "judge"]
            result: ["linter", "archivist", "judge"]
          - scenario: "Sequential group with current index 1"
            groups:
              - group_id: "g1"
                execution_mode: "sequential"
                agents: ["specify", "plan", "implement"]
            current_agent_index_in_group: 1
            result: ["plan"]
          - scenario: "All groups processed"
            current_group_index: 3
            groups_length: 3
            result: []

      is_complete:
        status: FIXED
        description: >
          Checks if the current group (or pipeline) has completed all agents.
          Fix: sequential groups now correctly return True when
          current_agent_index_in_group >= len(group.agents).
        signature: |
          @property
          def is_complete(self) -> bool
        returns:
          type: bool
          description: Whether the pipeline/group has completed
          guarantees:
            - Parallel groups are complete when ALL agent_statuses are terminal ("completed" or "failed")
            - Sequential groups are complete when current_agent_index_in_group >= len(group.agents)
            - Empty groups are skipped (not counted as incomplete)
            - Falls through to flat pipeline check when no groups configured
        fix_details: >
          Before: Sequential groups unconditionally returned False.
          After: Checks current_agent_index_in_group >= len(group.agents).

      current_agent:
        status: UNCHANGED
        description: >
          Returns the single current agent slug. NOT modified by this feature.
          Retained for backward compatibility with 20+ existing consumers.
        signature: |
          @property
          def current_agent(self) -> str | None

  # Behavioral contracts for polling loop changes
  x-behavioral-contracts:
    module: src.services.copilot_polling.pipeline
    function: _process_pipeline_completion

    polling_loop:
      description: >
        The main polling loop checks agent completion every 60 seconds.
        Modified to iterate over pipeline.current_agents instead of checking
        a single pipeline.current_agent.
      behavior:
        before: >
          Checks only current_agent (singular) — for parallel groups, this is
          always agent[0]. Other agents in the parallel group are never checked.
        after: >
          Iterates pipeline.current_agents. For each non-completed agent, calls
          _check_agent_done_on_sub_or_parent. If any agent completes, calls
          _advance_pipeline for that agent.
      invariants:
        - Sequential groups iterate exactly once (single agent) — no behavioral change
        - Parallel groups iterate over all agents in the group
        - Each completed agent is advanced individually via _advance_pipeline
        - Group advancement happens only when all agents reach terminal state
        - _advance_pipeline is NOT modified — its existing parallel logic is correct

    recovery_path:
      description: >
        The recovery path detects agents that were never assigned (e.g., after
        a service restart) and reassigns them.
      behavior:
        before: >
          Checks only current_agent (singular) — for parallel groups, only
          agent[0] is checked for reassignment.
        after: >
          Iterates pipeline.current_agents. For each non-completed agent,
          checks tracking table and pending cache. Unassigned agents are
          reassigned via assign_agent_for_status.
      invariants:
        - Already-active agents are not reassigned (tracking table check)
        - Already-pending agents are not reassigned (pending cache check)
        - Completed/failed agents are skipped
        - Each agent's flat index is looked up for assignment
