openapi: "3.1.0"
info:
  title: Suppression Guard CI Contract
  version: "1.0.0"
  description: |
    This is a pseudo-API contract for the CI suppression guard.
    The guard is not an HTTP service — it is a shell script run in CI.
    This contract documents its inputs, outputs, and behavior.

    The guard scans changed files for suppression directives and fails
    the build if any lack a reason justification.

paths:
  /guard/scan:
    post:
      summary: Scan files for unjustified suppressions
      description: |
        Conceptual operation performed by the CI guard script.
        Input: list of changed files (from git diff).
        Output: pass/fail with list of violations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                changed_files:
                  type: array
                  items:
                    type: string
                  description: Paths of files changed in the PR
                base_ref:
                  type: string
                  description: Base branch for comparison (e.g., main)
              required:
                - changed_files
      responses:
        "200":
          description: Scan passed — no unjustified suppressions found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [pass]
                  suppressions_found:
                    type: integer
                  all_justified:
                    type: boolean
        "422":
          description: Scan failed — unjustified suppressions detected
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [fail]
                  violations:
                    type: array
                    items:
                      type: object
                      properties:
                        file:
                          type: string
                        line:
                          type: integer
                        suppression:
                          type: string
                        rule:
                          type: string
                        reason_found:
                          type: boolean
                      required:
                        - file
                        - line
                        - suppression
                        - reason_found

components:
  schemas:
    SuppressionPattern:
      type: object
      description: A regex pattern that matches a suppression directive
      properties:
        language:
          type: string
          enum: [python, typescript, bicep]
        pattern:
          type: string
          description: Regex matching the suppression syntax
        reason_patterns:
          type: array
          items:
            type: string
          description: |
            Regexes that validate a reason is present.
            For Python noqa: `-- .+` or `reason: .+` on the same line.
            For ESLint: `-- .+` after the rule name.
            For Bicep: `reason: .+` on the preceding line.
      required:
        - language
        - pattern
        - reason_patterns
