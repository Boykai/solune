openapi: 3.1.0
info:
  title: Meaningful Test Coverage Surface Contract
  version: 0.1.0
  summary: Existing HTTP surfaces whose behavior must be protected by the 003 meaningful coverage effort.
  description: >
    Feature-scoped contract for the backend HTTP behaviors directly exercised by the
    coverage work in /home/runner/work/solune/solune/specs/003-test-coverage-meaningful/spec.md.
servers:
  - url: /api/v1
tags:
  - name: chat
  - name: settings
  - name: onboarding
  - name: templates
  - name: apps
paths:
  /chat/upload:
    post:
      tags: [chat]
      summary: Upload an attachment for later chat/task use
      description: Validates filename, file type, and 10 MB max size before persisting a temp file.
      x-source-path: /home/runner/work/solune/solune/solune/backend/src/api/chat.py
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: File accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadResponse'
        '400':
          description: Missing file, empty content, or invalid sanitized filename
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadError'
        '413':
          description: File too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadError'
        '415':
          description: Unsupported or blocked file type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadError'
  /settings/global:
    get:
      tags: [settings]
      summary: Read global settings
      x-source-path: /home/runner/work/solune/solune/solune/backend/src/api/settings.py
      responses:
        '200':
          description: Current global settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalSettingsResponse'
    put:
      tags: [settings]
      summary: Update global settings
      description: Restricted to admin sessions; no-op bodies must not create activity-log events.
      x-source-path: /home/runner/work/solune/solune/solune/backend/src/api/settings.py
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GlobalSettingsUpdate'
      responses:
        '200':
          description: Settings updated or treated as a no-op
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalSettingsResponse'
        '403':
          description: Caller is not an admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /settings/project/{project_id}:
    get:
      tags: [settings]
      summary: Read effective project settings
      x-source-path: /home/runner/work/solune/solune/solune/backend/src/api/settings.py
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Effective project settings for the selected project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectSettingsResponse'
    put:
      tags: [settings]
      summary: Update effective project settings
      x-source-path: /home/runner/work/solune/solune/solune/backend/src/api/settings.py
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectSettingsUpdate'
      responses:
        '200':
          description: Updated project settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectSettingsResponse'
  /settings/models/{provider}:
    get:
      tags: [settings]
      summary: Fetch models for an AI provider
      description: Missing provider credentials should surface a handled empty/error response rather than an unhandled failure.
      x-source-path: /home/runner/work/solune/solune/solune/backend/src/api/settings.py
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Models fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelsResponse'
        '400':
          description: Provider configuration or lookup error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /onboarding/state:
    get:
      tags: [onboarding]
      summary: Fetch onboarding state for the current user
      x-source-path: /home/runner/work/solune/solune/solune/backend/src/api/onboarding.py
      responses:
        '200':
          description: Existing or default onboarding state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingState'
    put:
      tags: [onboarding]
      summary: Update onboarding state for the current user
      description: Step values above 13 must fail validation.
      x-source-path: /home/runner/work/solune/solune/solune/backend/src/api/onboarding.py
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingStateUpdate'
      responses:
        '200':
          description: Updated onboarding state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingState'
        '422':
          description: Validation failure for out-of-range step values
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /templates:
    get:
      tags: [templates]
      summary: List app templates
      description: Invalid category filters must return a descriptive 400 response.
      x-source-path: /home/runner/work/solune/solune/solune/backend/src/api/templates.py
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Template summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TemplateSummary'
        '400':
          description: Invalid category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /templates/{template_id}:
    get:
      tags: [templates]
      summary: Get detailed template information
      x-source-path: /home/runner/work/solune/solune/solune/backend/src/api/templates.py
      parameters:
        - name: template_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Template detail payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateDetail'
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /apps/import:
    post:
      tags: [apps]
      summary: Import a GitHub repository as an app
      description: Repository URL normalization must deduplicate trailing slash and case differences; names that normalize to empty/invalid values must fail with 400.
      x-source-path: /home/runner/work/solune/solune/solune/backend/src/api/apps.py
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportAppRequest'
      responses:
        '201':
          description: App imported successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportAppResponse'
        '400':
          description: Invalid URL, invalid normalized app name, or duplicate import
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  parameters:
    ProjectId:
      name: project_id
      in: path
      required: true
      schema:
        type: string
  schemas:
    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
      required: [detail]
    FileUploadResponse:
      type: object
      properties:
        filename:
          type: string
        file_url:
          type: string
        content_type:
          type: string
        size:
          type: integer
      required: [filename, file_url, content_type, size]
    FileUploadError:
      type: object
      properties:
        filename:
          type: string
        error:
          type: string
        error_code:
          type: string
      required: [filename, error, error_code]
    GlobalSettingsUpdate:
      type: object
      additionalProperties: true
      description: Partial update body; empty payloads are valid no-op requests.
    GlobalSettingsResponse:
      type: object
      additionalProperties: true
    ProjectSettingsUpdate:
      type: object
      additionalProperties: true
    ProjectSettingsResponse:
      type: object
      additionalProperties: true
    ModelsResponse:
      type: object
      additionalProperties: true
    OnboardingState:
      type: object
      properties:
        user_id:
          type: string
        current_step:
          type: integer
          minimum: 0
          maximum: 13
        completed:
          type: boolean
        dismissed_at:
          type: string
          nullable: true
        completed_at:
          type: string
          nullable: true
      required: [user_id, current_step, completed, dismissed_at, completed_at]
    OnboardingStateUpdate:
      type: object
      properties:
        current_step:
          type: integer
          minimum: 0
          maximum: 13
        completed:
          type: boolean
          default: false
        dismissed:
          type: boolean
          default: false
      required: [current_step]
    TemplateSummary:
      type: object
      additionalProperties: true
    TemplateDetail:
      type: object
      additionalProperties: true
    ImportAppRequest:
      type: object
      properties:
        url:
          type: string
        pipeline_id:
          type: string
          nullable: true
        create_project:
          type: boolean
      required: [url]
    ImportAppResponse:
      type: object
      properties:
        name:
          type: string
        display_name:
          type: string
        external_repo_url:
          type: string
      additionalProperties: true
